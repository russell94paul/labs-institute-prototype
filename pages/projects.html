<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Projects</title>
    <link rel="stylesheet" href="../styles/base.css">
    <style>
    .pj-shell { padding: 20px 24px; }
    .pj-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 20px;
    }
    .pj-title {
        font-size: 1.1rem; font-weight: 800; letter-spacing: 0.12em;
        background: linear-gradient(90deg, #38bdf8, #a78bfa, #4ade80);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .pj-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 16px;
    }
    .pj-card {
        background: var(--card-gradient); border-radius: var(--card-radius);
        border: 1px solid var(--border-light); padding: 20px;
        cursor: pointer; transition: border-color 0.15s, transform 0.1s;
    }
    .pj-card:hover { border-color: var(--accent-blue); transform: translateY(-1px); }
    .pj-card-name { font-size: 0.92rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .pj-card-desc {
        font-size: 0.72rem; color: var(--text-dim); line-height: 1.5;
        margin-bottom: 12px;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .pj-card-meta {
        display: flex; align-items: center; gap: 10px;
        font-size: 0.65rem; color: var(--text-dim);
    }
    .pj-card-stat {
        display: flex; align-items: center; gap: 4px;
        padding: 3px 8px; border-radius: 6px;
        background: rgba(255,255,255,0.04); border: 1px solid var(--border-subtle);
    }
    .pj-card-stat-val {
        font-family: var(--font-mono); font-weight: 700;
        color: var(--text-secondary);
    }
    .pj-status {
        font-size: 0.58rem; font-weight: 700; padding: 2px 8px;
        border-radius: 6px; text-transform: uppercase;
    }
    .pj-status-active { background: rgba(74,222,128,0.15); color: var(--accent-green); }
    .pj-status-parked { background: rgba(255,255,255,0.05); color: var(--text-dim); }
    .pj-status-planned { background: rgba(167,139,250,0.15); color: var(--accent-purple); }
    .pj-empty {
        text-align: center; padding: 60px 20px;
        color: var(--text-dim); font-size: 0.82rem;
    }
    </style>
</head>
<body>
    <div class="pj-shell">
        <div class="pj-header">
            <div class="pj-title">PROJECTS</div>
            <button class="btn btn-primary btn-sm" onclick="window.navigateTo && window.navigateTo('onboarding')">+ New Project</button>
        </div>
        <div class="pj-grid" id="project-grid"></div>
    </div>

    <script>
    (function() {
        fetch('/api/projects')
            .then(function(r) { return r.json(); })
            .then(function(projects) {
                var el = document.getElementById('project-grid');
                if (!projects.length) {
                    el.innerHTML = '<div class="pj-empty"><h3>No projects yet</h3><p>Create one from the Onboarding tab.</p></div>';
                    return;
                }
                var html = '';
                projects.forEach(function(p) {
                    var phaseCount = (p.phases || []).length;
                    var completedCount = (p.phases || []).filter(function(ph) { return ph.status === 'complete' || ph.status === 'completed'; }).length;
                    var statusClass = p.status === 'active' ? 'active' : p.status === 'parked' ? 'parked' : 'planned';

                    html += '<div class="pj-card" onclick="window.navigateTo && window.navigateTo(\'phases\')">';
                    html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">';
                    html += '<div class="pj-card-name">' + esc(p.name) + '</div>';
                    html += '<span class="pj-status pj-status-' + statusClass + '">' + (p.status || 'active') + '</span>';
                    html += '</div>';
                    html += '<div class="pj-card-desc">' + esc(p.description || '') + '</div>';
                    html += '<div class="pj-card-meta">';
                    html += '<div class="pj-card-stat">Phases <span class="pj-card-stat-val">' + phaseCount + '</span></div>';
                    html += '<div class="pj-card-stat">Done <span class="pj-card-stat-val">' + completedCount + '</span></div>';
                    if (p.platform) html += '<div class="pj-card-stat">' + esc(p.platform) + '</div>';
                    if (p.build_order) html += '<div class="pj-card-stat">Build #<span class="pj-card-stat-val">' + p.build_order + '</span></div>';
                    html += '</div>';
                    html += '</div>';
                });
                el.innerHTML = html;
            })
            .catch(function(err) {
                document.getElementById('project-grid').innerHTML = '<div class="pj-empty"><p>Failed to load projects.</p></div>';
            });

        function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    })();
    </script>
</body>
</html>
