<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conductor Console</title>
    <link rel="stylesheet" href="../styles/base.css">
    <style>
    /* ================================================================
       Conductor Console — Styles
       ================================================================ */

    /* --- Shell --- */
    .cd-shell { padding: 0; }

    .cd-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 20px 24px 12px; flex-wrap: wrap; gap: 12px;
    }
    .cd-header-left { display: flex; align-items: center; gap: 14px; }
    .cd-header-right { display: flex; align-items: center; gap: 10px; }

    .cd-logo-wrap {
        width: 42px; height: 42px; flex-shrink: 0; position: relative;
    }
    .cd-logo-wrap svg { width: 100%; height: 100%; }
    .cd-logo-glow {
        position: absolute; inset: -4px; border-radius: 50%;
        background: radial-gradient(circle, rgba(56,189,248,0.25) 0%, transparent 70%);
        animation: cd-logo-pulse 3s ease-in-out infinite;
    }

    .cd-title-block { display: flex; flex-direction: column; gap: 1px; }
    .cd-wordmark {
        font-size: 1.1rem; font-weight: 800; letter-spacing: 0.18em;
        background: linear-gradient(90deg, #38bdf8, #a78bfa, #4ade80, #38bdf8);
        background-size: 300% 100%;
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: cd-shimmer-text 4s linear infinite;
    }
    .cd-subtitle-text {
        font-size: 0.62rem; color: var(--text-dim); text-transform: uppercase;
        letter-spacing: 0.14em; font-weight: 600;
    }

    .cd-env-badge {
        font-size: 0.6rem; font-weight: 700; padding: 3px 10px; border-radius: 10px;
        text-transform: uppercase; letter-spacing: 0.06em;
        background: rgba(74,222,128,0.12); color: var(--accent-green);
        border: 1px solid rgba(74,222,128,0.25);
    }
    .cd-release-badge {
        font-size: 0.6rem; font-weight: 700; padding: 3px 10px; border-radius: 10px;
        font-family: var(--font-mono);
        background: rgba(56,189,248,0.1); color: var(--accent-blue);
        border: 1px solid rgba(56,189,248,0.2);
    }
    .cd-agent-indicator {
        display: flex; align-items: center; gap: 5px;
        font-size: 0.65rem; color: var(--text-dim);
    }
    .cd-agent-dot {
        width: 7px; height: 7px; border-radius: 50%; background: var(--accent-green);
        animation: cd-agent-pulse 2s ease-in-out infinite;
    }
    .cd-search-box {
        font-size: 0.72rem; padding: 5px 12px; border-radius: 8px;
        background: rgba(255,255,255,0.04); border: 1px solid var(--border-light);
        color: var(--text-dim); min-width: 140px; cursor: pointer;
        font-family: var(--font-family);
    }

    /* --- KPI Strip --- */
    .cd-kpi-strip {
        display: flex; align-items: center; gap: 12px;
        padding: 8px 24px 12px; flex-wrap: wrap;
    }
    .cd-kpi-item {
        display: flex; align-items: center; gap: 6px;
        font-size: 0.7rem; color: var(--text-dim);
        background: rgba(255,255,255,0.02); border: 1px solid var(--border-subtle);
        border-radius: 8px; padding: 5px 12px;
    }
    .cd-kpi-val {
        font-family: var(--font-mono); font-weight: 800;
        color: var(--text-secondary); font-size: 0.78rem;
    }
    .cd-ring-wrap { width: 28px; height: 28px; flex-shrink: 0; }
    .cd-ring-wrap svg { width: 100%; height: 100%; }
    .cd-ring-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 3; }
    .cd-ring-fill {
        fill: none; stroke-width: 3; stroke-linecap: round;
        transition: stroke-dashoffset 1s ease;
    }

    /* --- Tagline --- */
    .cd-tagline {
        text-align: center; font-size: 0.68rem; color: var(--text-faint);
        padding: 0 24px 8px; letter-spacing: 0.08em;
    }
    .cd-tagline-sep { margin: 0 8px; color: var(--text-faint); opacity: 0.4; }

    /* --- View Tabs --- */
    .cd-tabs {
        display: flex; gap: 2px; padding: 0 24px;
        border-bottom: 1px solid var(--border-light);
    }
    .cd-tab {
        padding: 8px 16px; font-size: 0.72rem; font-weight: 600;
        color: var(--text-dim); cursor: pointer; border: none; background: none;
        border-bottom: 2px solid transparent; transition: all 0.2s;
        font-family: var(--font-family); white-space: nowrap;
    }
    .cd-tab:hover { color: var(--text-secondary); }
    .cd-tab.active {
        color: var(--accent-blue); border-bottom-color: var(--accent-blue);
    }

    /* --- View Panels --- */
    .cd-view { display: none; padding: 16px 24px; min-height: 400px; }
    .cd-view.active { display: block; animation: fadeIn 0.3s ease; }

    /* ================================================================
       Board View
       ================================================================ */
    .cd-board-scroll {
        overflow-x: auto; overflow-y: auto; max-height: calc(100vh - 300px);
        border: 1px solid var(--border-subtle); border-radius: 10px;
    }
    .cd-board-grid {
        display: grid;
        grid-template-columns: 170px repeat(12, minmax(105px, 1fr));
        min-width: 1430px;
    }
    .cd-board-corner {
        position: sticky; left: 0; top: 0; z-index: 4;
        background: var(--bg-darker); padding: 8px 10px;
        border-bottom: 1px solid var(--border-medium);
        border-right: 1px solid var(--border-subtle);
        font-size: 0.6rem; color: var(--text-faint); text-transform: uppercase;
        letter-spacing: 0.1em; font-weight: 700;
    }
    .cd-board-colhd {
        position: sticky; top: 0; z-index: 3;
        background: var(--bg-darker); padding: 8px 6px;
        border-bottom: 1px solid var(--border-medium);
        font-size: 0.58rem; color: var(--text-dim); text-transform: uppercase;
        letter-spacing: 0.06em; font-weight: 700; text-align: center;
        white-space: nowrap;
    }
    .cd-board-lanehd {
        position: sticky; left: 0; z-index: 2;
        background: linear-gradient(90deg, var(--bg-darker) 85%, transparent);
        padding: 10px 10px; border-bottom: 1px solid var(--border-subtle);
        border-right: 1px solid var(--border-subtle);
        font-size: 0.68rem; font-weight: 600; color: var(--text-secondary);
        display: flex; align-items: center; gap: 7px; white-space: nowrap;
    }
    .cd-lane-dot {
        width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .cd-board-cell {
        padding: 4px; border-bottom: 1px solid var(--border-subtle);
        border-right: 1px solid rgba(255,255,255,0.015);
        min-height: 48px; vertical-align: top;
    }

    /* Task Card (compact) */
    .cd-tcard {
        padding: 5px 7px; margin: 2px 0; border-radius: 6px;
        background: var(--card-gradient); border: 1px solid var(--border-medium);
        cursor: pointer; transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
        font-size: 0.62rem; position: relative; overflow: hidden;
    }
    .cd-tcard:hover {
        transform: translateY(-1px); border-color: rgba(56,189,248,0.3);
        box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    .cd-tcard-title {
        font-weight: 600; color: var(--text-secondary); line-height: 1.3;
        margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis;
        white-space: nowrap; max-width: 90px;
    }
    .cd-tcard-meta {
        display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
    }
    .cd-tcard-agent {
        font-size: 0.55rem; color: var(--accent-blue); font-weight: 600;
    }
    .cd-tcard-priority {
        font-size: 0.5rem; font-weight: 700; padding: 1px 5px;
        border-radius: 6px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .cd-tcard-priority.critical { background: rgba(248,113,113,0.2); color: var(--accent-red); }
    .cd-tcard-priority.high { background: rgba(251,146,60,0.2); color: var(--accent-amber); }
    .cd-tcard-priority.medium { background: rgba(56,189,248,0.15); color: var(--accent-blue); }
    .cd-tcard-priority.low { background: rgba(255,255,255,0.06); color: var(--text-dim); }
    .cd-tcard-flags { display: flex; gap: 3px; margin-top: 2px; }
    .cd-tcard-flag {
        font-size: 0.48rem; padding: 1px 4px; border-radius: 4px;
        background: rgba(255,255,255,0.04); color: var(--text-faint);
    }
    .cd-tcard-flag.risk-high { background: rgba(248,113,113,0.12); color: var(--accent-red); }
    .cd-tcard-flag.approval { background: rgba(250,204,21,0.12); color: var(--accent-gold); }
    .cd-tcard-flag.pr { background: rgba(167,139,250,0.12); color: var(--accent-purple); }

    /* Card status effects */
    .cd-tcard.st-in_progress {
        border-left: 2px solid var(--accent-blue);
        animation: sessionRunPulse 3s ease-in-out infinite;
    }
    .cd-tcard.st-in_progress::after {
        content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
        background-size: 200% 100%; animation: shimmer 2s linear infinite;
    }
    .cd-tcard.st-done, .cd-tcard.st-deployed, .cd-tcard.st-monitoring {
        border-left: 2px solid var(--accent-green);
        box-shadow: 0 0 8px rgba(74,222,128,0.1);
    }
    .cd-tcard.st-blocked {
        border-left: 2px solid var(--accent-red);
        border-color: rgba(248,113,113,0.3);
    }
    .cd-tcard.st-review {
        border-left: 2px solid var(--accent-purple);
    }
    .cd-tcard.st-approved {
        border-left: 2px solid var(--accent-gold);
        animation: cd-approval-glow 2.5s ease-in-out infinite;
    }

    /* ================================================================
       Roadmap View
       ================================================================ */
    .cd-rm-container { max-width: 1000px; }
    .cd-rm-track {
        position: relative; padding-left: 32px;
        border-left: 2px solid var(--border-medium); margin-left: 16px;
    }
    .cd-rm-node {
        position: relative; margin-bottom: 20px; padding: 14px 18px;
        background: var(--card-gradient); border: 1px solid var(--border-medium);
        border-radius: 10px; transition: border-color 0.2s;
    }
    .cd-rm-node:hover { border-color: rgba(56,189,248,0.25); }
    .cd-rm-dot {
        position: absolute; left: -41px; top: 16px;
        width: 12px; height: 12px; border-radius: 50%;
        border: 2px solid var(--bg-primary);
    }
    .cd-rm-dot.done { background: var(--accent-green); box-shadow: 0 0 8px rgba(74,222,128,0.4); }
    .cd-rm-dot.active { background: var(--accent-blue); animation: pulse 2s infinite; }
    .cd-rm-dot.pending { background: var(--accent-slate); }
    .cd-rm-dot.blocked { background: var(--accent-red); }
    .cd-rm-title { font-size: 0.88rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .cd-rm-date {
        font-size: 0.65rem; color: var(--text-dim); font-family: var(--font-mono);
        margin-bottom: 6px;
    }
    .cd-rm-tasks {
        font-size: 0.72rem; color: var(--text-muted); margin-bottom: 6px;
    }
    .cd-rm-reco {
        font-size: 0.68rem; padding: 8px 12px; border-radius: 8px;
        background: rgba(56,189,248,0.06); border-left: 2px solid var(--accent-blue);
        color: var(--text-body); margin-top: 8px; line-height: 1.5;
    }
    .cd-rm-badge {
        font-size: 0.58rem; font-weight: 700; padding: 2px 8px;
        border-radius: 8px; text-transform: uppercase; display: inline-block;
    }
    .cd-rm-badge.done { background: rgba(74,222,128,0.15); color: var(--accent-green); }
    .cd-rm-badge.active { background: rgba(56,189,248,0.15); color: var(--accent-blue); }
    .cd-rm-badge.pending { background: rgba(255,255,255,0.06); color: var(--text-dim); }
    .cd-rm-badge.blocked { background: rgba(248,113,113,0.15); color: var(--accent-red); }

    /* ================================================================
       Task Development View
       ================================================================ */
    .cd-td-layout { display: flex; gap: 16px; min-height: 500px; }
    .cd-td-list {
        width: 260px; flex-shrink: 0; overflow-y: auto;
        max-height: calc(100vh - 300px);
        border: 1px solid var(--border-subtle); border-radius: 10px;
        background: rgba(255,255,255,0.015);
    }
    .cd-td-list-header {
        padding: 10px 14px; font-size: 0.7rem; font-weight: 700;
        color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em;
        border-bottom: 1px solid var(--border-subtle);
    }
    .cd-td-item {
        padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border-subtle);
        transition: background 0.15s;
    }
    .cd-td-item:hover { background: rgba(255,255,255,0.03); }
    .cd-td-item.selected { background: rgba(56,189,248,0.06); border-left: 2px solid var(--accent-blue); }
    .cd-td-item-title { font-size: 0.78rem; font-weight: 600; color: var(--text-secondary); }
    .cd-td-item-sub { font-size: 0.62rem; color: var(--text-dim); margin-top: 2px; }

    .cd-td-detail {
        flex: 1; border: 1px solid var(--border-subtle); border-radius: 10px;
        background: rgba(255,255,255,0.015); overflow-y: auto;
        max-height: calc(100vh - 300px);
    }
    .cd-td-empty {
        display: flex; align-items: center; justify-content: center;
        height: 100%; color: var(--text-faint); font-size: 0.82rem;
    }
    .cd-td-header {
        padding: 16px 20px; border-bottom: 1px solid var(--border-subtle);
    }
    .cd-td-title { font-size: 1.05rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .cd-td-id { font-size: 0.68rem; color: var(--accent-blue); font-family: var(--font-mono); }
    .cd-td-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }

    .cd-td-tabs {
        display: flex; gap: 0; border-bottom: 1px solid var(--border-subtle);
        padding: 0 20px;
    }
    .cd-td-tab {
        padding: 8px 14px; font-size: 0.68rem; font-weight: 600;
        color: var(--text-dim); cursor: pointer; border: none; background: none;
        border-bottom: 2px solid transparent; font-family: var(--font-family);
    }
    .cd-td-tab:hover { color: var(--text-secondary); }
    .cd-td-tab.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }

    .cd-td-body { padding: 16px 20px; }
    .cd-td-section { margin-bottom: 16px; }
    .cd-td-section-title {
        font-size: 0.68rem; font-weight: 700; color: var(--text-dim);
        text-transform: uppercase; letter-spacing: 0.08em;
        margin-bottom: 8px; padding-bottom: 4px;
        border-bottom: 1px solid var(--border-subtle);
    }
    .cd-td-row {
        display: flex; justify-content: space-between; padding: 3px 0;
        font-size: 0.78rem;
    }
    .cd-td-row-label { color: var(--text-dim); }
    .cd-td-row-val { color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.75rem; }
    .cd-td-desc { font-size: 0.8rem; color: var(--text-body); line-height: 1.7; }
    .cd-td-reco {
        padding: 10px 14px; border-radius: 8px; font-size: 0.78rem;
        background: rgba(56,189,248,0.06); border-left: 2px solid var(--accent-blue);
        color: var(--text-body); line-height: 1.5;
    }

    /* ================================================================
       DAG View
       ================================================================ */
    .cd-dag-wrap {
        border: 1px solid var(--border-subtle); border-radius: 10px;
        background: rgba(0,0,0,0.15); overflow: auto;
        max-height: calc(100vh - 300px);
    }
    .cd-dag-svg { min-width: 1100px; min-height: 520px; display: block; }

    .cd-dag-edge-line {
        fill: none; stroke-width: 1.5; opacity: 0.4;
    }
    .cd-dag-edge-line.critical {
        stroke-width: 2; opacity: 0.7;
        stroke-dasharray: 6 3; animation: cd-dash-flow 1.5s linear infinite;
    }

    .cd-dag-node-rect {
        rx: 8; ry: 8; stroke-width: 1.5;
        transition: filter 0.2s;
    }
    .cd-dag-node-rect:hover { filter: brightness(1.2); cursor: pointer; }
    .cd-dag-node-text {
        font-size: 9px; font-family: var(--font-family);
        font-weight: 600; text-anchor: middle; dominant-baseline: middle;
    }
    .cd-dag-node-sub {
        font-size: 7px; font-family: var(--font-mono);
        text-anchor: middle; dominant-baseline: middle;
        fill: rgba(255,255,255,0.4);
    }

    .cd-dag-node-g.active .cd-dag-node-rect {
        animation: cd-node-pulse 2.5s ease-in-out infinite;
    }
    .cd-dag-node-g.done .cd-dag-node-rect {
        filter: drop-shadow(0 0 6px rgba(74,222,128,0.4));
    }
    .cd-dag-node-g.blocked .cd-dag-node-rect {
        stroke-dasharray: 4 2;
    }
    .cd-dag-node-g.approval .cd-dag-node-rect {
        animation: cd-approval-glow 2.5s ease-in-out infinite;
    }

    .cd-dag-legend {
        display: flex; gap: 16px; padding: 10px 16px; flex-wrap: wrap;
        border-top: 1px solid var(--border-subtle);
        font-size: 0.62rem; color: var(--text-dim);
    }
    .cd-dag-legend-item { display: flex; align-items: center; gap: 5px; }
    .cd-dag-legend-dot {
        width: 10px; height: 10px; border-radius: 3px;
    }

    /* ================================================================
       Deploy View
       ================================================================ */
    .cd-dep-container { max-width: 1000px; }
    .cd-dep-header {
        display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .cd-dep-release {
        font-size: 1.1rem; font-weight: 700; color: #fff;
        font-family: var(--font-mono);
    }
    .cd-dep-envs {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 12px; margin-bottom: 24px;
    }
    .cd-dep-env {
        background: var(--card-gradient); border: 1px solid var(--border-medium);
        border-radius: 10px; padding: 14px 16px; position: relative; overflow: hidden;
    }
    .cd-dep-env-name {
        font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.08em; margin-bottom: 6px;
    }
    .cd-dep-env-status {
        display: flex; align-items: center; gap: 6px;
        font-size: 0.75rem; color: var(--text-secondary);
    }
    .cd-dep-env-ver {
        font-size: 0.65rem; color: var(--text-dim); font-family: var(--font-mono);
        margin-top: 4px;
    }
    .cd-dep-env.active-env {
        border-color: rgba(56,189,248,0.3);
        box-shadow: 0 0 16px rgba(56,189,248,0.1);
    }
    .cd-dep-env.active-env::after {
        content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
        animation: shimmer 2s linear infinite; background-size: 200% 100%;
    }

    .cd-dep-pipeline-title {
        font-size: 0.82rem; font-weight: 700; color: #fff; margin-bottom: 12px;
    }
    .cd-dep-stages {
        display: flex; gap: 2px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .cd-dep-stage {
        flex: 1; min-width: 100px; padding: 10px 12px;
        background: rgba(255,255,255,0.02); border: 1px solid var(--border-subtle);
        border-radius: 8px; text-align: center; position: relative;
    }
    .cd-dep-stage-name {
        font-size: 0.65rem; font-weight: 600; color: var(--text-secondary);
        margin-bottom: 4px;
    }
    .cd-dep-stage-status { font-size: 0.58rem; }
    .cd-dep-stage.done-stage {
        border-color: rgba(74,222,128,0.2);
        background: rgba(74,222,128,0.04);
    }
    .cd-dep-stage.active-stage {
        border-color: rgba(56,189,248,0.3);
        background: rgba(56,189,248,0.04);
        animation: sessionRunPulse 3s ease-in-out infinite;
    }
    .cd-dep-stage.pending-stage { opacity: 0.5; }
    .cd-dep-stage.blocked-stage {
        border-color: rgba(251,146,60,0.3);
        background: rgba(251,146,60,0.04);
    }
    .cd-dep-stage-arrow {
        position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
        color: var(--text-faint); font-size: 0.7rem; z-index: 1;
    }

    .cd-dep-checks-title {
        font-size: 0.82rem; font-weight: 700; color: #fff; margin-bottom: 12px;
    }
    .cd-dep-checks {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 8px; margin-bottom: 20px;
    }
    .cd-dep-check {
        display: flex; align-items: center; gap: 8px; padding: 8px 12px;
        border-radius: 8px; background: rgba(255,255,255,0.02);
        border: 1px solid var(--border-subtle); font-size: 0.72rem;
        color: var(--text-secondary);
    }
    .cd-dep-check-icon { font-size: 0.82rem; flex-shrink: 0; }
    .cd-dep-check.passed { border-color: rgba(74,222,128,0.2); }
    .cd-dep-check.failed { border-color: rgba(248,113,113,0.2); }
    .cd-dep-check.pending-chk { border-color: rgba(255,255,255,0.06); opacity: 0.6; }

    .cd-dep-recos { display: flex; flex-direction: column; gap: 8px; }
    .cd-dep-reco {
        padding: 10px 14px; border-radius: 8px; font-size: 0.75rem;
        line-height: 1.5;
    }
    .cd-dep-reco.info { background: rgba(56,189,248,0.06); border-left: 2px solid var(--accent-blue); color: var(--text-body); }
    .cd-dep-reco.warn { background: rgba(251,146,60,0.06); border-left: 2px solid var(--accent-amber); color: var(--text-body); }
    .cd-dep-reco.success { background: rgba(74,222,128,0.06); border-left: 2px solid var(--accent-green); color: var(--text-body); }

    /* ================================================================
       Review / PR View
       ================================================================ */
    .cd-rev-container { max-width: 1000px; }
    .cd-rev-flow-bar {
        display: flex; align-items: center; gap: 6px; margin-bottom: 20px;
        padding: 12px 16px; background: rgba(255,255,255,0.02);
        border: 1px solid var(--border-subtle); border-radius: 10px;
        font-size: 0.68rem; color: var(--text-dim); flex-wrap: wrap;
    }
    .cd-rev-flow-step {
        padding: 4px 10px; border-radius: 6px;
        background: rgba(255,255,255,0.04);
        color: var(--text-muted); font-weight: 600;
    }
    .cd-rev-flow-arrow { color: var(--text-faint); }
    .cd-rev-cards { display: flex; flex-direction: column; gap: 10px; }
    .cd-rev-pr {
        background: var(--card-gradient); border: 1px solid var(--border-medium);
        border-radius: 10px; padding: 14px 18px; cursor: pointer;
        transition: border-color 0.2s, transform 0.15s;
    }
    .cd-rev-pr:hover {
        border-color: rgba(56,189,248,0.25); transform: translateY(-1px);
    }
    .cd-rev-pr-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .cd-rev-pr-id {
        font-family: var(--font-mono); font-weight: 700;
        color: var(--accent-purple); font-size: 0.82rem;
    }
    .cd-rev-pr-title { font-size: 0.85rem; font-weight: 600; color: #fff; flex: 1; }
    .cd-rev-pr-body { display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.72rem; }
    .cd-rev-pr-stat {
        display: flex; align-items: center; gap: 4px; color: var(--text-dim);
    }
    .cd-rev-pr-stat-val { color: var(--text-secondary); font-family: var(--font-mono); }
    .cd-rev-pr-actions { display: flex; gap: 6px; margin-top: 10px; }
    .cd-rev-score-bar {
        width: 60px; height: 4px; border-radius: 2px;
        background: rgba(255,255,255,0.08); overflow: hidden;
    }
    .cd-rev-score-fill { height: 100%; border-radius: 2px; }

    /* ================================================================
       Approval Modal (extends base modal)
       ================================================================ */
    .cd-approval-body {
        font-size: 0.85rem; color: var(--text-body); line-height: 1.7;
        margin-bottom: 16px;
    }
    .cd-approval-detail {
        font-size: 0.75rem; padding: 10px 14px; border-radius: 8px;
        background: rgba(255,255,255,0.03); border: 1px solid var(--border-subtle);
        margin-bottom: 12px; color: var(--text-muted);
    }

    /* ================================================================
       Animations
       ================================================================ */
    @keyframes cd-logo-pulse {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.05); }
    }
    @keyframes cd-shimmer-text {
        0% { background-position: 0% 50%; }
        100% { background-position: 300% 50%; }
    }
    @keyframes cd-agent-pulse {
        0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,222,128,0.5); }
        50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(74,222,128,0); }
    }
    @keyframes cd-node-pulse {
        0%, 100% { filter: drop-shadow(0 0 4px rgba(56,189,248,0.3)); }
        50% { filter: drop-shadow(0 0 12px rgba(56,189,248,0.6)); }
    }
    @keyframes cd-approval-glow {
        0%, 100% { box-shadow: 0 0 4px rgba(250,204,21,0.15); }
        50% { box-shadow: 0 0 16px rgba(250,204,21,0.3); }
    }
    @keyframes cd-dash-flow {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -18; }
    }
    @keyframes cd-deploy-progress {
        0% { width: 0; }
        100% { width: var(--progress); }
    }
    </style>
</head>
<body>
    <div class="cd-shell">
        <!-- Header -->
        <div class="cd-header">
            <div class="cd-header-left">
                <div class="cd-logo-wrap">
                    <div class="cd-logo-glow"></div>
                    <svg viewBox="0 0 42 42" fill="none">
                        <defs>
                            <linearGradient id="cdGrad" x1="0" y1="0" x2="42" y2="42" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#38bdf8"/>
                                <stop offset="50%" stop-color="#a78bfa"/>
                                <stop offset="100%" stop-color="#4ade80"/>
                            </linearGradient>
                        </defs>
                        <path d="M30 7C18 7 9 14 9 21s9 14 21 14" stroke="url(#cdGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
                        <circle cx="30" cy="7" r="3.5" fill="#38bdf8"/>
                        <circle cx="9" cy="21" r="3" fill="#a78bfa"/>
                        <circle cx="30" cy="35" r="3.5" fill="#4ade80"/>
                        <circle cx="21" cy="12" r="2" fill="rgba(56,189,248,0.5)"/>
                        <circle cx="21" cy="30" r="2" fill="rgba(167,139,250,0.5)"/>
                        <line x1="30" y1="7" x2="21" y2="12" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
                        <line x1="21" y1="12" x2="9" y2="21" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
                        <line x1="9" y1="21" x2="21" y2="30" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
                        <line x1="21" y1="30" x2="30" y2="35" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
                    </svg>
                </div>
                <div class="cd-title-block">
                    <span class="cd-wordmark">CONDUCTOR</span>
                    <span class="cd-subtitle-text">Autonomous Delivery Console</span>
                </div>
            </div>
            <div class="cd-header-right">
                <select id="cd-project-filter" onchange="loadLiveData()" style="font-size:0.72rem;font-weight:600;padding:5px 10px;border-radius:8px;border:1px solid var(--border-light);background:rgba(255,255,255,0.04);color:var(--text-secondary);cursor:pointer;">
                    <option value="">All Projects</option>
                    <option value="neurospect">NeuroSpect</option>
                    <option value="labs-institute">Labs Institute</option>
                    <option value="groovenet">GrooveNet</option>
                    <option value="conductor">Conductor</option>
                </select>
                <div class="cd-agent-indicator">
                    <span class="cd-agent-dot"></span>
                    <span id="cd-active-agents">0 sessions</span>
                </div>
                <div class="cd-env-badge">Local</div>
                <input type="text" class="cd-search-box" placeholder="Search tasks..." readonly>
            </div>
        </div>

        <!-- KPI Strip -->
        <div class="cd-kpi-strip" id="cd-kpis"></div>

        <!-- Tagline -->
        <div class="cd-tagline">
            Plan <span class="cd-tagline-sep">&rarr;</span>
            Build <span class="cd-tagline-sep">&rarr;</span>
            Review <span class="cd-tagline-sep">&rarr;</span>
            Merge <span class="cd-tagline-sep">&rarr;</span>
            Deploy
        </div>

        <!-- View Tabs -->
        <div class="cd-tabs" id="cd-tabs">
            <button class="cd-tab active" data-view="board">Board</button>
            <button class="cd-tab" data-view="roadmap">Roadmap</button>
            <button class="cd-tab" data-view="taskdev">Task Dev</button>
            <button class="cd-tab" data-view="dag">DAG</button>
            <button class="cd-tab" data-view="deploy">Deploy</button>
            <button class="cd-tab" data-view="review">Review / PR</button>
        </div>

        <!-- Views -->
        <div class="cd-view active" id="view-board"></div>
        <div class="cd-view" id="view-roadmap"></div>
        <div class="cd-view" id="view-taskdev"></div>
        <div class="cd-view" id="view-dag"></div>
        <div class="cd-view" id="view-deploy"></div>
        <div class="cd-view" id="view-review"></div>
    </div>

    <!-- Approval Modal -->
    <div class="modal-overlay" id="cd-approval-modal">
        <div class="modal" style="max-width:480px;">
            <h2 id="cd-approval-title"></h2>
            <div id="cd-approval-content"></div>
            <div class="modal-actions" id="cd-approval-actions"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="cd-toast"></div>

    <script>
    (function() {
    'use strict';

    /* ================================================================
       Data Layer — Types + Mock Data
       ================================================================ */

    var LANES = [
        { id: 'requests', name: 'Requests / Bugs', color: '#fb923c' },
        { id: 'requirements', name: 'Requirements', color: '#a78bfa' },
        { id: 'planning', name: 'Planning / Roadmap', color: '#38bdf8' },
        { id: 'frontend', name: 'Frontend', color: '#f472b6' },
        { id: 'backend', name: 'Backend', color: '#60a5fa' },
        { id: 'infrastructure', name: 'Infrastructure', color: '#fbbf24' },
        { id: 'qa', name: 'QA / Validation', color: '#34d399' },
        { id: 'code_review', name: 'Code Review / PR', color: '#c084fc' },
        { id: 'deployment', name: 'Deployment', color: '#22d3ee' },
        { id: 'monitoring', name: 'Post-Deploy', color: '#4ade80' },
        { id: 'approvals', name: 'Approvals', color: '#fbbf24' }
    ];

    var COLUMNS = [
        { id: 'intake', name: 'Intake' },
        { id: 'scoped', name: 'Scoped' },
        { id: 'planned', name: 'Planned' },
        { id: 'ready', name: 'Ready' },
        { id: 'in_progress', name: 'In Progress' },
        { id: 'blocked', name: 'Blocked' },
        { id: 'review', name: 'Review' },
        { id: 'approved', name: 'Approved' },
        { id: 'merged', name: 'Merged' },
        { id: 'deployed', name: 'Deployed' },
        { id: 'monitoring', name: 'Monitoring' },
        { id: 'done', name: 'Done' }
    ];

    var AGENTS = [
        { id: 'request-bot', name: 'RequestBot', lane: 'requests', status: 'active' },
        { id: 'spec-writer', name: 'SpecWriter', lane: 'requirements', status: 'idle' },
        { id: 'planner', name: 'Planner', lane: 'planning', status: 'active' },
        { id: 'ui-builder', name: 'UIBuilder', lane: 'frontend', status: 'active' },
        { id: 'api-builder', name: 'APIBuilder', lane: 'backend', status: 'active' },
        { id: 'infra-bot', name: 'InfraBot', lane: 'infrastructure', status: 'idle' },
        { id: 'qa-bot', name: 'QABot', lane: 'qa', status: 'active' },
        { id: 'review-bot', name: 'ReviewBot', lane: 'code_review', status: 'active' },
        { id: 'deploy-bot', name: 'DeployBot', lane: 'deployment', status: 'idle' },
        { id: 'monitor-bot', name: 'MonitorBot', lane: 'monitoring', status: 'idle' },
        { id: 'approval-bot', name: 'ApprovalBot', lane: 'approvals', status: 'idle' }
    ];

    var TASKS = []; // Populated by loadLiveData()
    var PRS = [];
    var MILESTONES = [];
    var DEPLOYMENT = { release: '', environments: [], stages: [], checks: [] };

    var _mockDataReplaced = true; // Flag: we use live data now

    // Column mapping for pipeline stage status → kanban column
    var _stageToColumn = {
        pending: 'planned', ready: 'ready', running: 'in_progress',
        completed: 'done', failed: 'blocked', blocked: 'blocked',
        waiting_for_approval: 'review', cancelled: 'done', skipped: 'done'
    };

    // Lane mapping for stage type/name
    var _stageToLane = {
        plan: 'planning', 'plan-review': 'approvals', implement: 'backend',
        test: 'qa', review: 'code_review', deploy: 'deployment'
    };

    function loadLiveData() {
        var project = document.getElementById('cd-project-filter').value;
        var phasesUrl = project ? '/api/projects/' + project + '/phases' : '/api/bootstrap/phases';
        var pipesUrl = '/api/pipelines' + (project ? '?project=' + project : '');
        var sessionsUrl = '/api/sessions';
        var requestsUrl = project ? '/api/projects/' + project + '/requests' : null;

        Promise.all([
            fetch(phasesUrl).then(function(r) { return r.json(); }),
            fetch(pipesUrl).then(function(r) { return r.json(); }),
            fetch(sessionsUrl).then(function(r) { return r.json(); }),
            requestsUrl ? fetch(requestsUrl).then(function(r) { return r.json(); }).catch(function() { return []; }) : Promise.resolve([])
        ]).then(function(results) {
            var phasesData = results[0];
            var pipes = results[1] || [];
            var sessData = results[2];
            var requests = results[3] || [];

            var phases = Array.isArray(phasesData) ? phasesData : (phasesData.phases || []);
            var sessions = (sessData && sessData.sessions) ? sessData.sessions : [];
            if (!Array.isArray(pipes)) pipes = [];

            TASKS = [];
            PRS = [];
            MILESTONES = [];

            // Map pipeline stages to tasks
            var taskNum = 0;
            pipes.forEach(function(pipe) {
                (pipe.stages || []).forEach(function(stage) {
                    taskNum++;
                    var col = _stageToColumn[stage.status] || 'planned';
                    var lane = _stageToLane[stage.name] || 'backend';
                    TASKS.push({
                        id: (stage.session_id || pipe.id + '/' + stage.name),
                        title: stage.label || stage.name,
                        description: 'Pipeline: ' + pipe.name + ' | Stage: ' + stage.name,
                        lane: lane, column: col,
                        priority: stage.status === 'failed' ? 'critical' : stage.status === 'running' ? 'high' : 'medium',
                        assigneeAgent: null, humanOwner: null,
                        dependencies: (stage.depends_on || []).map(function(d) { return pipe.id + '/' + d; }),
                        blockedBy: [], linkedPR: null,
                        environment: null, riskLevel: 'low',
                        approvalRequired: stage.type === 'gate',
                        approvalStatus: stage.status === 'waiting_for_approval' ? 'pending' : null,
                        recommendation: stage.error || '',
                        filesChanged: [],
                        createdAt: stage.started_at || pipe.created_at || '',
                        updatedAt: stage.ended_at || stage.started_at || '',
                        completedAt: stage.status === 'completed' ? (stage.ended_at || '') : null,
                        acceptanceCriteria: [],
                        testStatus: null, reviewFindings: []
                    });
                });
            });

            // Map project requests to tasks
            requests.forEach(function(req) {
                TASKS.push({
                    id: req.id || 'REQ-' + requests.indexOf(req),
                    title: req.title || 'Untitled request',
                    description: req.description || '',
                    lane: 'requests',
                    column: req.status === 'open' ? 'intake' : req.status === 'closed' ? 'done' : 'scoped',
                    priority: req.priority || 'medium',
                    assigneeAgent: null, humanOwner: req.author || null,
                    dependencies: [], blockedBy: [], linkedPR: null,
                    environment: null, riskLevel: 'low',
                    approvalRequired: false, approvalStatus: null,
                    recommendation: '', filesChanged: [],
                    createdAt: req.created || '', updatedAt: req.created || '', completedAt: null,
                    acceptanceCriteria: [], testStatus: null, reviewFindings: []
                });
            });

            // Map phases to milestones
            phases.forEach(function(ph, i) {
                MILESTONES.push({
                    id: 'MS-' + (i + 1),
                    name: ph.name || ph.phaseId,
                    date: ph.lastUpdated || '',
                    status: ph.status === 'completed' ? 'done' : (ph.status === 'in-progress' || ph.status === 'running') ? 'active' : 'pending',
                    tasks: [],
                    reco: ph.description || ''
                });
            });

            // Build deployment from latest running pipeline
            var runningPipe = pipes.find(function(p) { return p.status === 'running'; });
            if (runningPipe) {
                DEPLOYMENT.release = runningPipe.name;
                DEPLOYMENT.stages = (runningPipe.stages || []).map(function(s) {
                    return {
                        name: s.label || s.name,
                        status: s.status === 'completed' ? 'done' : s.status === 'running' ? 'active' : s.status === 'waiting_for_approval' ? 'blocked' : 'pending'
                    };
                });
            }

            // Update agent count
            var activeSessions = sessions.filter(function(s) { return s.status === 'running'; }).length;
            document.getElementById('cd-active-agents').textContent = activeSessions + ' session' + (activeSessions !== 1 ? 's' : '') + ' active';

            renderAll();
        }).catch(function(err) {
            console.error('loadLiveData failed:', err);
        });
    }

    // Mock data removed — see git history for original mock TASKS/PRS/MILESTONES/DEPLOYMENT
    /* ================================================================
       State
       ================================================================ */
    var activeView = 'board';
    var selectedTaskId = null;
    var selectedTdTab = 'overview';

    /* ================================================================
       Helpers
       ================================================================ */
    function $(id) { return document.getElementById(id); }

    function getTask(id) { return TASKS.find(function(t) { return t.id === id; }); }

    function getTasksAt(lane, col) {
        return TASKS.filter(function(t) { return t.lane === lane && t.column === col; });
    }

    function getLane(id) { return LANES.find(function(l) { return l.id === id; }); }

    function getAgent(id) { return AGENTS.find(function(a) { return a.id === id; }); }

    function showToast(msg, isError) {
        var t = $('cd-toast');
        t.textContent = msg;
        t.className = 'toast' + (isError ? ' error' : '') + ' show';
        setTimeout(function() { t.className = 'toast'; }, 3000);
    }

    function badgeClass(status) {
        var map = { done: 'green', in_progress: 'blue', active: 'blue', review: 'purple',
                    approved: 'gold', blocked: 'red', monitoring: 'green', deployed: 'green',
                    merged: 'green', pending: '' };
        return map[status] || '';
    }

    function prStatusLabel(s) {
        var map = { approved: 'Approved', in_review: 'In Review', draft: 'Draft',
                    changes_requested: 'Changes Requested', merged: 'Merged' };
        return map[s] || s;
    }

    function prStatusClass(s) {
        var map = { approved: 'green', in_review: 'purple', draft: '',
                    changes_requested: 'amber', merged: 'green' };
        return map[s] || '';
    }

    /* ================================================================
       KPI Rendering
       ================================================================ */
    function renderKPIs() {
        var total = TASKS.length;
        var done = TASKS.filter(function(t) { return t.column === 'done' || t.column === 'deployed' || t.column === 'monitoring'; }).length;
        var inProg = TASKS.filter(function(t) { return t.column === 'in_progress'; }).length;
        var blocked = TASKS.filter(function(t) { return t.column === 'blocked'; }).length;
        var approvals = TASKS.filter(function(t) { return t.approvalRequired && t.approvalStatus === 'pending'; }).length;
        var mergeReady = PRS.filter(function(p) { return p.status === 'approved'; }).length;
        var checksPass = DEPLOYMENT.checks.filter(function(c) { return c.passed; }).length;
        var pct = total > 0 ? Math.round((done / total) * 100) : 0;
        var circumference = 2 * Math.PI * 12;
        var offset = circumference - (pct / 100) * circumference;

        var html = '';
        html += '<div class="cd-kpi-item"><div class="cd-ring-wrap"><svg viewBox="0 0 28 28">';
        html += '<circle class="cd-ring-track" cx="14" cy="14" r="12"/>';
        html += '<circle class="cd-ring-fill" cx="14" cy="14" r="12" stroke="var(--accent-green)"';
        html += ' stroke-dasharray="' + circumference.toFixed(1) + '"';
        html += ' stroke-dashoffset="' + offset.toFixed(1) + '"';
        html += ' transform="rotate(-90 14 14)"/>';
        html += '</svg></div><span class="cd-kpi-val">' + pct + '%</span> Complete</div>';
        html += '<div class="cd-kpi-item">Total <span class="cd-kpi-val">' + total + '</span></div>';
        html += '<div class="cd-kpi-item" style="color:var(--accent-blue);">In Progress <span class="cd-kpi-val">' + inProg + '</span></div>';
        html += '<div class="cd-kpi-item" style="color:var(--accent-red);">Blocked <span class="cd-kpi-val">' + blocked + '</span></div>';
        html += '<div class="cd-kpi-item" style="color:var(--accent-gold);">Approvals <span class="cd-kpi-val">' + approvals + '</span></div>';
        html += '<div class="cd-kpi-item" style="color:var(--accent-purple);">Merge Ready <span class="cd-kpi-val">' + mergeReady + '</span></div>';
        html += '<div class="cd-kpi-item" style="color:var(--accent-green);">Deploy Checks <span class="cd-kpi-val">' + checksPass + '/' + DEPLOYMENT.checks.length + '</span></div>';
        html += '<div class="cd-kpi-item">Stability <span class="cd-kpi-val" style="color:var(--accent-green);">98.7</span></div>';
        $('cd-kpis').innerHTML = html;

        var activeAgents = AGENTS.filter(function(a) { return a.status === 'active'; }).length;
        $('cd-active-agents').textContent = activeAgents + ' agents active';
    }

    /* ================================================================
       View Switching
       ================================================================ */
    function switchView(view) {
        activeView = view;
        document.querySelectorAll('.cd-tab').forEach(function(t) {
            t.classList.toggle('active', t.dataset.view === view);
        });
        document.querySelectorAll('.cd-view').forEach(function(v) {
            v.classList.toggle('active', v.id === 'view-' + view);
        });
        var renderers = {
            board: renderBoard, roadmap: renderRoadmap, taskdev: renderTaskDev,
            dag: renderDAG, deploy: renderDeploy, review: renderReview
        };
        if (renderers[view]) renderers[view]();
    }

    /* ================================================================
       Board View
       ================================================================ */
    function renderBoard() {
        var html = '<div class="cd-board-scroll"><div class="cd-board-grid">';
        html += '<div class="cd-board-corner">Lane \\ Stage</div>';
        COLUMNS.forEach(function(c) {
            html += '<div class="cd-board-colhd">' + c.name + '</div>';
        });
        LANES.forEach(function(lane) {
            html += '<div class="cd-board-lanehd"><span class="cd-lane-dot" style="background:' + lane.color + '"></span>' + lane.name + '</div>';
            COLUMNS.forEach(function(col) {
                var tasks = getTasksAt(lane.id, col.id);
                html += '<div class="cd-board-cell">';
                tasks.forEach(function(t) {
                    html += renderTaskCard(t);
                });
                html += '</div>';
            });
        });
        html += '</div></div>';
        $('view-board').innerHTML = html;
    }

    function renderTaskCard(t) {
        var h = '<div class="cd-tcard st-' + t.column + '" onclick="window._cdSelectTask(\'' + t.id + '\')" title="' + t.title + '">';
        h += '<div class="cd-tcard-title">' + t.title + '</div>';
        h += '<div class="cd-tcard-meta">';
        if (t.assigneeAgent) {
            var agent = getAgent(t.assigneeAgent);
            h += '<span class="cd-tcard-agent">' + (agent ? agent.name : t.assigneeAgent) + '</span>';
        }
        h += '<span class="cd-tcard-priority ' + t.priority + '">' + t.priority + '</span>';
        h += '</div>';
        h += '<div class="cd-tcard-flags">';
        if (t.riskLevel === 'high' || t.riskLevel === 'critical') h += '<span class="cd-tcard-flag risk-high">RISK</span>';
        if (t.approvalRequired) h += '<span class="cd-tcard-flag approval">APPROVAL</span>';
        if (t.linkedPR) h += '<span class="cd-tcard-flag pr">' + t.linkedPR + '</span>';
        if (t.dependencies.length > 0) h += '<span class="cd-tcard-flag">deps:' + t.dependencies.length + '</span>';
        h += '</div></div>';
        return h;
    }

    /* ================================================================
       Roadmap View
       ================================================================ */
    function renderRoadmap() {
        var html = '<div class="cd-rm-container">';
        html += '<h2 style="margin-bottom:16px;">Delivery Roadmap</h2>';
        html += '<div class="cd-rm-track">';
        MILESTONES.forEach(function(ms) {
            var tasksHtml = ms.tasks.map(function(tid) {
                var t = getTask(tid);
                return t ? '<span class="badge ' + badgeClass(t.column) + '" style="margin-right:4px;">' + t.id + '</span>' : '';
            }).join('');
            html += '<div class="cd-rm-node">';
            html += '<div class="cd-rm-dot ' + ms.status + '"></div>';
            html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">';
            html += '<span class="cd-rm-title" style="margin:0;">' + ms.name + '</span>';
            html += '<span class="cd-rm-badge ' + ms.status + '">' + ms.status + '</span>';
            html += '</div>';

    /* ================================================================
       DAG View
       ================================================================ */
    function renderDAG() {
        var colX = {};
        var totalCols = COLUMNS.length;
        COLUMNS.forEach(function(c, i) {
            colX[c.id] = 60 + i * 90;
        });
        var laneY = {};
        LANES.forEach(function(l, i) {
            laneY[l.id] = 40 + i * 42;
        });

        var w = 60 + totalCols * 90 + 40;
        var h = 40 + LANES.length * 42 + 40;

        var svg = '<svg class="cd-dag-svg" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="xMidYMid meet">';

        svg += '<defs><linearGradient id="dagEdgeGrad" x1="0" y1="0" x2="1" y2="0">';
        svg += '<stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6"/>';
        svg += '<stop offset="100%" stop-color="#4ade80" stop-opacity="0.6"/>';
        svg += '</linearGradient></defs>';

        var nodePositions = {};
        TASKS.forEach(function(t) {
            nodePositions[t.id] = { x: colX[t.column] || 60, y: laneY[t.lane] || 40 };
        });

        var edges = [];
        TASKS.forEach(function(t) {
            t.dependencies.forEach(function(depId) {
                if (nodePositions[depId]) {
                    edges.push({ from: depId, to: t.id, type: 'depends' });
                }
            });
            t.blockedBy.forEach(function(bId) {
                if (nodePositions[bId]) {
                    edges.push({ from: bId, to: t.id, type: 'blocks' });
                }
            });
        });

        edges.forEach(function(e) {
            var from = nodePositions[e.from];
            var to = nodePositions[e.to];
            if (!from || !to) return;
            var mx = (from.x + to.x) / 2;
            var critical = e.type === 'depends';
            svg += '<path class="cd-dag-edge-line' + (critical ? ' critical' : '') + '"';
            svg += ' d="M' + from.x + ' ' + from.y + ' C' + mx + ' ' + from.y + ' ' + mx + ' ' + to.y + ' ' + to.x + ' ' + to.y + '"';
            svg += ' stroke="' + (e.type === 'blocks' ? 'var(--accent-red)' : 'url(#dagEdgeGrad)') + '"/>';
        });

        TASKS.forEach(function(t) {
            var pos = nodePositions[t.id];
            if (!pos) return;
            var lane = getLane(t.lane);
            var nodeClass = 'cd-dag-node-g';
            if (t.column === 'in_progress') nodeClass += ' active';
            else if (t.column === 'done' || t.column === 'deployed' || t.column === 'monitoring') nodeClass += ' done';
            else if (t.column === 'blocked') nodeClass += ' blocked';
            else if (t.approvalRequired && t.approvalStatus === 'pending') nodeClass += ' approval';

            var fillColor = lane ? lane.color : '#64748b';
            svg += '<g class="' + nodeClass + '" onclick="window._cdSelectTask(\'' + t.id + '\')">';
            svg += '<rect class="cd-dag-node-rect" x="' + (pos.x - 36) + '" y="' + (pos.y - 14) + '"';
            svg += ' width="72" height="28" fill="rgba(15,25,35,0.9)" stroke="' + fillColor + '"/>';
            svg += '<text class="cd-dag-node-text" x="' + pos.x + '" y="' + (pos.y - 2) + '" fill="' + fillColor + '">' + t.id + '</text>';
            var shortTitle = t.title.length > 12 ? t.title.substring(0, 12) + '..' : t.title;
            svg += '<text class="cd-dag-node-sub" x="' + pos.x + '" y="' + (pos.y + 8) + '">' + shortTitle + '</text>';
            svg += '</g>';
        });

        svg += '</svg>';

        var legendHtml = '<div class="cd-dag-legend">';
        legendHtml += '<div class="cd-dag-legend-item"><div class="cd-dag-legend-dot" style="background:var(--accent-blue);animation:pulse 2s infinite;"></div> In Progress</div>';
        legendHtml += '<div class="cd-dag-legend-item"><div class="cd-dag-legend-dot" style="background:var(--accent-green);box-shadow:0 0 6px rgba(74,222,128,0.4);"></div> Complete</div>';
        legendHtml += '<div class="cd-dag-legend-item"><div class="cd-dag-legend-dot" style="background:var(--accent-red);"></div> Blocked</div>';
        legendHtml += '<div class="cd-dag-legend-item"><div class="cd-dag-legend-dot" style="background:var(--accent-gold);animation:cd-approval-glow 2.5s infinite;"></div> Awaiting Approval</div>';
        legendHtml += '<div class="cd-dag-legend-item"><div class="cd-dag-legend-dot" style="background:var(--accent-slate);"></div> Pending</div>';
        legendHtml += '</div>';

        $('view-dag').innerHTML = '<div class="cd-dag-wrap">' + svg + legendHtml + '</div>';
    }

    /* ================================================================
       Approval System
       ================================================================ */
    function showApprovalModal(title, body, actions) {
        $('cd-approval-title').textContent = title;
        $('cd-approval-content').innerHTML = body;
        $('cd-approval-actions').innerHTML = actions;
        $('cd-approval-modal').classList.add('open');
    }

    function closeApprovalModal() {
        $('cd-approval-modal').classList.remove('open');
    }

    window._cdShowApproval = function(taskId) {
        var t = getTask(taskId);
        if (!t) return;
        var body = '<div class="cd-approval-body">' + t.recommendation + '</div>';
        body += '<div class="cd-approval-detail">';
        body += '<div><strong>Task:</strong> ' + t.id + ' — ' + t.title + '</div>';
        body += '<div><strong>Risk:</strong> ' + t.riskLevel + '</div>';
        body += '<div><strong>Environment:</strong> ' + (t.environment || 'N/A') + '</div>';
        body += '</div>';
        var actions = '<button class="btn btn-back btn-sm" onclick="window._cdCloseApproval()">Defer</button>';
        actions += '<button class="btn btn-ghost btn-sm" onclick="window._cdApprovalAction(\'' + taskId + '\', \'changes\')">Request Changes</button>';
        actions += '<button class="btn btn-success btn-sm" onclick="window._cdApprovalAction(\'' + taskId + '\', \'approve\')">Approve</button>';
        showApprovalModal('Approval Required: ' + t.id, body, actions);
    };

    window._cdShowMergeApproval = function(prId) {
        var pr = PRS.find(function(p) { return p.id === prId; });
        if (!pr) return;
        var body = '<div class="cd-approval-body">' + pr.id + ' — ' + pr.title + ' is ready to merge.</div>';
        body += '<div class="cd-approval-detail">';
        body += '<div><strong>Files Changed:</strong> ' + pr.filesChanged + ' (+' + pr.additions + ' / -' + pr.deletions + ')</div>';
        body += '<div><strong>Approvals:</strong> ' + pr.approvals + '/' + pr.required + '</div>';
        body += '<div><strong>Merge Score:</strong> ' + pr.mergeScore + '%</div>';
        body += '</div>';
        var actions = '<button class="btn btn-back btn-sm" onclick="window._cdCloseApproval()">Cancel</button>';
        actions += '<button class="btn btn-success btn-sm" onclick="window._cdApprovalAction(\'' + prId + '\', \'merge\')">Confirm Merge</button>';
        showApprovalModal('Merge ' + prId + '?', body, actions);
    };

    window._cdApprovalAction = function(id, action) {
        closeApprovalModal();
        var labels = { approve: 'Approved', changes: 'Changes requested', merge: 'Merge initiated' };
        showToast((labels[action] || action) + ' — ' + id + ' (mock)');
    };

    window._cdCloseApproval = function() {
        closeApprovalModal();
    };

    $('cd-approval-modal').addEventListener('click', function(e) {
        if (e.target === this) closeApprovalModal();
    });

    /* ================================================================
       Global Interactions
       ================================================================ */
    window._cdSelectTask = function(taskId) {
        selectedTaskId = taskId;
        if (activeView !== 'taskdev') {
            switchView('taskdev');
        } else {
            renderTaskDev();
        }
    };

    window._cdSwitchTdTab = function(tab) {
        selectedTdTab = tab;
        renderTaskDev();
    };

    /* ================================================================
       Init
       ================================================================ */
    function renderAll() {
        renderKPIs();
        renderBoard();
        if (activeView === 'roadmap') renderRoadmap();
        if (activeView === 'deploy') renderDeploy();
        if (activeView === 'review') renderReview();
    }

    function init() {
        document.querySelectorAll('.cd-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                switchView(this.dataset.view);
            });
        });

        loadLiveData();
    }

    init();

    })();
    </script>
</body>
</html>
