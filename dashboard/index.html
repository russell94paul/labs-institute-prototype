<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conductor</title>
    <link rel="stylesheet" href="styles/base.css">
    <style>
        body { display: flex; flex-direction: column; }

        /* Top nav shell */
        .topnav {
            display: flex; align-items: center; gap: 4px; padding: 0 20px;
            background: linear-gradient(180deg, #0d161f 0%, #0a1219 100%);
            border-bottom: 1px solid var(--border-light);
            height: 56px; position: sticky; top: 0; z-index: 100;
        }
        .topnav-brand {
            display: flex; align-items: center; gap: 10px;
            margin-right: 24px; white-space: nowrap; cursor: pointer;
        }
        .topnav-mark {
            width: 30px; height: 30px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 800; color: #fff;
            box-shadow: 0 0 16px rgba(56,189,248,0.3);
        }
        .topnav-brand-text { display: flex; flex-direction: column; line-height: 1.15; }
        .topnav-brand-name {
            font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 0.3px;
        }
        .topnav-brand-sub {
            font-size: 9.5px; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 0.14em;
        }

        .topnav-links {
            display: flex; align-items: center; gap: 2px; flex: 1; height: 100%;
        }
        .topnav-link {
            display: flex; align-items: center; gap: 6px;
            padding: 0 14px; height: 100%;
            font-size: 0.78rem; font-weight: 600;
            color: var(--text-secondary); text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
            cursor: pointer; white-space: nowrap;
        }
        .topnav-link svg {
            width: 14px; height: 14px;
            stroke: currentColor; fill: none;
            stroke-width: 1.8;
            stroke-linecap: round; stroke-linejoin: round;
        }
        .topnav-link:hover { color: #fff; background: rgba(255,255,255,0.03); }
        .topnav-link.active {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }

        /* Status bar */
        .statusbar {
            display: flex; align-items: center; gap: 14px;
            margin-left: auto; font-size: 0.72rem; flex-shrink: 0;
        }
        .statusbar-item {
            display: flex; align-items: center; gap: 5px;
            color: var(--text-dim); white-space: nowrap;
        }
        .statusbar-val {
            font-family: var(--font-mono);
            font-weight: 700;
            color: var(--text-secondary);
        }
        .conn-dot {
            width: 7px; height: 7px; border-radius: 50%;
            display: inline-block;
        }
        .conn-dot.connected {
            background: var(--accent-green);
            box-shadow: 0 0 0 0 rgba(74,222,128,0.6);
            animation: connPulse 2.2s ease-out infinite;
        }
        .conn-dot.disconnected {
            background: var(--accent-red);
            animation: none;
        }
        @keyframes connPulse {
            0%   { box-shadow: 0 0 0 0 rgba(74,222,128,0.5); }
            70%  { box-shadow: 0 0 0 8px rgba(74,222,128,0); }
            100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
        }

        /* Breadcrumbs */
        .breadcrumb-bar {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 24px; background: rgba(255,255,255,0.015);
            border-bottom: 1px solid var(--border-subtle);
            font-size: 0.72rem; color: var(--text-dim); min-height: 28px;
        }
        .breadcrumb-bar a { color: var(--accent-blue); text-decoration: none; cursor: pointer; }
        .breadcrumb-bar a:hover { text-decoration: underline; }
        .breadcrumb-sep { margin: 0 2px; }

        /* Content area */
        .content-area {
            flex: 1; overflow-y: auto; position: relative;
            min-height: calc(100vh - 84px);
        }

        /* Loading indicator */
        .loading-bar {
            position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            transform: scaleX(0); transform-origin: left;
            transition: transform 0.3s; z-index: 10;
        }
        .loading-bar.active { transform: scaleX(0.7); transition: transform 0.8s; }
        .loading-bar.done   { transform: scaleX(1); transition: transform 0.15s; }
    </style>
</head>
<body>
    <div class="topnav">
        <div class="topnav-brand" onclick="window.navigateTo('sessions')">
            <div class="topnav-mark">C</div>
            <div class="topnav-brand-text">
                <span class="topnav-brand-name">Conductor</span>
                <span class="topnav-brand-sub">Product Orchestrator</span>
            </div>
        </div>

        <div class="topnav-links" id="topnav-links">
            <a class="topnav-link" data-route="labs">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                Labs Institute
            </a>
            <a class="topnav-link" data-route="groovenet">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none"/><path d="M9 9a3 3 0 106 0"/><path d="M15 15a3 3 0 10-6 0"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>
                GrooveNet
            </a>
            <a class="topnav-link" data-route="build-studio">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="9" x2="9" y2="21"/></svg>
                Build Studio
            </a>
            <a class="topnav-link" data-route="onboarding">
                <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                Onboarding
            </a>
            <a class="topnav-link" data-route="conductor">
                <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="2" fill="currentColor" opacity="0.6"/><circle cx="12" cy="5" r="2" fill="currentColor" opacity="0.6"/><circle cx="19" cy="12" r="2" fill="currentColor" opacity="0.6"/><circle cx="12" cy="19" r="2" fill="currentColor" opacity="0.6"/><line x1="5" y1="12" x2="12" y2="5" opacity="0.4"/><line x1="12" y1="5" x2="19" y2="12" opacity="0.4"/><line x1="19" y1="12" x2="12" y2="19" opacity="0.4"/><line x1="12" y1="19" x2="5" y2="12" opacity="0.4"/></svg>
                Conductor
            </a>
            <a class="topnav-link" data-route="sessions">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="14" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                Sessions
            </a>
            <a class="topnav-link" data-route="pipelines">
                <svg viewBox="0 0 24 24"><path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/></svg>
                Pipelines
            </a>
            <a class="topnav-link" data-route="phases">
                <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                Phases
            </a>
            <a class="topnav-link" data-route="projects">
                <svg viewBox="0 0 24 24"><path d="M3 3h7v7H3z"/><path d="M14 3h7v7h-7z"/><path d="M3 14h7v7H3z"/><path d="M14 14h7v7h-7z"/></svg>
                Projects
            </a>
            <a class="topnav-link" data-route="requirements">
                <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                Requirements
            </a>
            <a class="topnav-link" data-route="bootstrap">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                Bootstrap
            </a>
        </div>

        <div class="statusbar">
            <div class="statusbar-item">
                <span class="conn-dot connected" id="conn-dot"></span>
                <span id="conn-label">Connected</span>
            </div>
            <div class="statusbar-item">
                Sessions: <span class="statusbar-val" id="stat-sessions">0</span>
            </div>
            <div class="statusbar-item">
                Cost: <span class="statusbar-val" id="stat-cost">$0.00</span>
            </div>
        </div>
    </div>

    <div class="breadcrumb-bar" id="breadcrumbs">
        <span>Conductor</span>
    </div>

    <div class="content-area" id="content-area">
        <div class="loading-bar" id="loading-bar"></div>
        <div id="page-content"></div>
    </div>

    <style id="page-styles"></style>

    <!-- Data preloader -->
    <script>
    window.ConductorData = { sessions: null, pipelines: null, projects: null };
    (function() {
        function tryFetch(url) {
            return fetch(url).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; });
        }
        Promise.all([
            tryFetch('data/sessions.json'),
            tryFetch('data/pipelines.json'),
            tryFetch('data/projects.json')
        ]).then(function(results) {
            window.ConductorData.sessions = results[0];
            window.ConductorData.pipelines = results[1];
            window.ConductorData.projects = results[2];
            window.dispatchEvent(new CustomEvent('conductor-data-ready'));
        });
    })();
    </script>

    <!-- SPA router -->
    <script>
    (function() {
        var routes = {
            'labs':            { path: 'pages/labs.html',            label: 'Labs Institute' },
            'labs-onboarding': { path: 'pages/labs-onboarding.html', label: 'Labs Onboarding' },
            'groovenet':    { path: 'pages/groovenet.html',    label: 'GrooveNet' },
            'build-studio': { path: 'pages/build-studio.html', label: 'Build Studio' },
            'onboarding':   { path: 'pages/onboarding-studio.html', label: 'Product Onboarding Studio' },
            'conductor':    { path: 'pages/conductor.html',    label: 'Conductor Console' },
            'sessions':     { path: 'pages/sessions.html',     label: 'Sessions' },
            'pipelines':    { path: 'pages/pipelines.html',    label: 'Pipelines' },
            'phases':       { path: 'pages/phases.html',       label: 'Phases' },
            'projects':     { path: 'pages/projects.html',     label: 'Projects' },
            'requirements': { path: 'pages/requirements.html', label: 'Requirements' },
            'bootstrap':    { path: 'pages/bootstrap.html',    label: 'Bootstrap Console' }
        };

        var currentRoute = null;

        function updateBreadcrumbs(route) {
            var bc = document.getElementById('breadcrumbs');
            var info = routes[route];
            if (!info) return;
            var parts = ['<a onclick="window.navigateTo(\'sessions\')">Conductor</a>'];
            if (route !== 'sessions') {
                parts.push('<span class="breadcrumb-sep">&#8250;</span>');
                parts.push('<span style="color:var(--text-secondary);">' + info.label + '</span>');
            } else {
                parts.push('<span class="breadcrumb-sep">&#8250;</span>');
                parts.push('<span style="color:var(--text-secondary);">Session Board</span>');
            }
            bc.innerHTML = parts.join('');
        }

        function updateActiveLink(route) {
            document.querySelectorAll('.topnav-link[data-route]').forEach(function(l) {
                l.classList.toggle('active', l.dataset.route === route);
            });
        }

        function extractContent(html) {
            var styles = '';
            var bodyContent = '';

            var styleMatches = html.match(/<style[^>]*>([\s\S]*?)<\/style>/gi);
            if (styleMatches) {
                for (var i = 0; i < styleMatches.length; i++) {
                    var inner = styleMatches[i].replace(/<\/?style[^>]*>/gi, '');
                    styles += inner + '\n';
                }
            }

            var bodyMatch = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
            if (bodyMatch) {
                bodyContent = bodyMatch[1];
            }

            var scripts = [];
            var scriptRe = /<script\b([^>]*)>([\s\S]*?)<\/script>/gi;
            var sm;
            while ((sm = scriptRe.exec(html)) !== null) {
                var attrs = sm[1] || '';
                var inline = sm[2] || '';
                var srcMatch = attrs.match(/\bsrc\s*=\s*["']([^"']+)["']/i);
                if (srcMatch) {
                    scripts.push({ src: srcMatch[1] });
                } else if (inline.trim()) {
                    scripts.push({ code: inline });
                }
            }
            return { styles: styles, body: bodyContent, scripts: scripts };
        }

        window.navigateTo = function(route) {
            if (!routes[route]) return;
            if (route === currentRoute) return;
            currentRoute = route;

            window.location.hash = route;
            updateActiveLink(route);
            updateBreadcrumbs(route);

            var pagePath = routes[route].path;
            var loadBar = document.getElementById('loading-bar');
            var content = document.getElementById('page-content');
            var pageStyles = document.getElementById('page-styles');

            loadBar.className = 'loading-bar active';

            fetch(pagePath)
                .then(function(r) {
                    if (!r.ok) throw new Error('Page not found');
                    return r.text();
                })
                .then(function(html) {
                    var parsed = extractContent(html);
                    pageStyles.textContent = parsed.styles;

                    // Strip script tags from body content before injecting
                    var cleanBody = parsed.body.replace(/<script\b[^>]*>[\s\S]*?<\/script>/gi, '');
                    content.innerHTML = cleanBody;

                    // Execute scripts in order
                    parsed.scripts.forEach(function(s) {
                        var el = document.createElement('script');
                        if (s.src) {
                            el.src = s.src;
                        } else {
                            el.textContent = s.code;
                        }
                        document.body.appendChild(el);
                    });

                    loadBar.className = 'loading-bar done';
                    setTimeout(function() { loadBar.className = 'loading-bar'; }, 300);
                })
                .catch(function(err) {
                    content.innerHTML = '<div style="padding:60px 20px;text-align:center;color:var(--text-muted);">' +
                        '<h2 style="margin-bottom:8px;">Page not found</h2>' +
                        '<p style="font-size:0.85rem;">' + route + ' is not yet available.</p></div>';
                    loadBar.className = 'loading-bar';
                });
        };

        // Nav link click handlers
        document.querySelectorAll('.topnav-link[data-route]').forEach(function(link) {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                window.navigateTo(this.dataset.route);
            });
        });

        // Boot: route from hash or default to conductor
        var hash = window.location.hash.replace('#', '').split('&')[0];
        window.navigateTo(hash && routes[hash] ? hash : 'labs');

        // Handle back/forward
        window.addEventListener('hashchange', function() {
            var h = window.location.hash.replace('#', '').split('&')[0];
            if (h && routes[h] && h !== currentRoute) {
                window.navigateTo(h);
            }
        });
    })();
    </script>

    <!-- Status bar updater -->
    <script>
    (function() {
        function updateStats() {
            var sessions = window.ConductorData.sessions;
            if (!sessions || !Array.isArray(sessions)) return;

            var running = sessions.filter(function(s) { return s.status === 'running'; }).length;
            var total = sessions.length;
            var cost = sessions.reduce(function(sum, s) { return sum + (s.cost_usd || 0); }, 0);

            var statEl = document.getElementById('stat-sessions');
            var costEl = document.getElementById('stat-cost');
            if (statEl) statEl.textContent = running + '/' + total;
            if (costEl) costEl.textContent = '$' + cost.toFixed(2);
        }

        window.addEventListener('conductor-data-ready', updateStats);
        window.addEventListener('conductor-sessions-updated', updateStats);
    })();
    </script>
</body>
</html>
