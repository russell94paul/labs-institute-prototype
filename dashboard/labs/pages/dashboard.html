<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
.dash-kpi-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    margin-bottom: 24px;
}

.dash-kpi {
    background: var(--card-gradient);
    border: 1px solid var(--border-medium);
    border-radius: 10px;
    padding: 16px;
}

.dash-kpi-val {
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1;
    color: #fff;
}

.dash-kpi-label {
    font-size: 0.66rem;
    color: var(--text-label);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 6px;
}

.dash-kpi-sub {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 3px;
    font-family: var(--font-mono);
}

.dash-section {
    margin-bottom: 24px;
}

.dash-section-title {
    font-size: 0.88rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.dash-two-col {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 16px;
}

.dash-ticket-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    font-family: var(--font-mono);
    color: var(--text-dim);
}

.dash-ticket-track {
    width: 60px;
    height: 5px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
}

.dash-ticket-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--accent-green);
}

.dash-pipeline-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 0.82rem;
}

.dash-pipeline-row:last-child {
    border-bottom: none;
}

.dash-pipeline-stage {
    color: var(--text-secondary);
}

.dash-pipeline-count {
    font-family: var(--font-mono);
    font-weight: 700;
    color: #fff;
    font-size: 0.88rem;
}

.dash-revenue-chart {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 100px;
    padding-top: 8px;
}

.dash-rev-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
}

.dash-rev-bar {
    width: 100%;
    border-radius: 3px 3px 0 0;
    background: linear-gradient(180deg, var(--accent-purple), rgba(167,139,250,0.3));
    transition: height 0.5s ease;
}

.dash-rev-label {
    font-size: 0.6rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.04em;
}

.dash-rev-val {
    font-size: 0.58rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
}

.dash-artist-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border-subtle);
}

.dash-artist-row:last-child {
    border-bottom: none;
}

.dash-artist-avatar {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.58rem;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
}

.dash-artist-name {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-primary);
    min-width: 90px;
}

.dash-artist-trend {
    font-size: 0.68rem;
    font-family: var(--font-mono);
    color: var(--accent-green);
    margin-left: auto;
    min-width: 36px;
    text-align: right;
}

.dash-actions-list {
    list-style: none;
    padding: 0;
    margin: 0;
}

.dash-actions-list li {
    padding: 8px 0;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 0.8rem;
    color: var(--text-body);
    display: flex;
    align-items: flex-start;
    gap: 8px;
    line-height: 1.5;
}

.dash-actions-list li:last-child {
    border-bottom: none;
}

.dash-action-bullet {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-purple);
    flex-shrink: 0;
    margin-top: 6px;
}

.dash-action-source {
    font-size: 0.66rem;
    color: var(--text-dim);
    font-family: var(--font-mono);
}

@media (max-width: 1024px) {
    .dash-kpi-row {
        grid-template-columns: repeat(3, 1fr);
    }
    .dash-two-col {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 768px) {
    .dash-kpi-row {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>
<body>
<div class="labs-page">
    <div class="labs-page-header">
        <div>
            <div class="labs-page-title">HQ Dashboard</div>
            <div class="labs-page-subtitle">Agency overview and priority actions</div>
        </div>
    </div>

    <div class="dash-kpi-row" id="dash-kpis"></div>

    <div class="dash-section">
        <div class="dash-section-title">Priority Alerts</div>
        <div id="dash-alerts"></div>
    </div>

    <div class="dash-two-col">
        <div>
            <div class="dash-section">
                <div class="dash-section-title">Upcoming Gigs</div>
                <div class="card" style="padding: 0; overflow: hidden;">
                    <table class="data-table" id="dash-gigs-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Event</th>
                                <th>Artists</th>
                                <th>Venue</th>
                                <th>Tickets</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="dash-gigs-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="dash-section">
                <div class="dash-section-title">Opportunity Pipeline</div>
                <div class="card" id="dash-pipeline"></div>
            </div>
        </div>

        <div>
            <div class="dash-section">
                <div class="dash-section-title">Revenue Trend</div>
                <div class="card">
                    <div class="dash-revenue-chart" id="dash-rev-chart"></div>
                </div>
            </div>

            <div class="dash-section">
                <div class="dash-section-title">Top Artist Momentum</div>
                <div class="card" id="dash-artist-momentum"></div>
            </div>

            <div class="dash-section">
                <div class="dash-section-title">Recommended Next Actions</div>
                <div class="card">
                    <ul class="dash-actions-list" id="dash-actions"></ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    var data = window.LabsData;
    var h = window.LabsHelpers;
    var m = data.metrics;

    var kpis = [
        { val: m.activeOpportunities, label: 'Active Opportunities', color: 'var(--accent-blue)' },
        { val: m.confirmedGigs, label: 'Confirmed Gigs', color: 'var(--accent-green)' },
        { val: m.pendingContracts, label: 'Pending Contracts', color: 'var(--accent-amber)' },
        { val: m.unpaidDeposits, label: 'Unpaid Deposits', sub: h.formatCurrency(23500), color: 'var(--accent-red)' },
        { val: h.formatCurrency(m.projectedRevenue), label: 'Projected Revenue', color: 'var(--accent-purple)' },
        { val: m.profitMargin + '%', label: 'Profit Margin', color: 'var(--accent-gold)' }
    ];

    var kpiContainer = document.getElementById('dash-kpis');
    kpis.forEach(function(k) {
        var el = document.createElement('div');
        el.className = 'dash-kpi';
        el.innerHTML = '<div class="dash-kpi-val" style="color:' + k.color + '">' + k.val + '</div>' +
            '<div class="dash-kpi-label">' + k.label + '</div>' +
            (k.sub ? '<div class="dash-kpi-sub">' + k.sub + '</div>' : '');
        kpiContainer.appendChild(el);
    });

    var alertsContainer = document.getElementById('dash-alerts');
    data.alerts.forEach(function(a) {
        var cls = a.type === 'danger' ? 'danger' : a.type === 'warning' ? 'warning' : a.type === 'success' ? 'success' : 'info';
        var el = document.createElement('div');
        el.className = 'alert-card ' + cls;
        el.innerHTML = '<div class="alert-dot"></div><div>' + a.message + '</div>';
        alertsContainer.appendChild(el);
    });

    var gigsBody = document.getElementById('dash-gigs-body');
    var sortedGigs = data.gigs.slice().sort(function(a, b) { return new Date(a.date) - new Date(b.date); });
    sortedGigs.forEach(function(g) {
        var pct = g.capacity > 0 ? Math.round((g.ticketsSold / g.capacity) * 100) : 0;
        var badgeColor = h.getStatusBadge(g.status);
        var tr = document.createElement('tr');
        tr.innerHTML = '<td style="white-space:nowrap;font-family:var(--font-mono);font-size:0.75rem">' + h.formatDateShort(g.date) + '</td>' +
            '<td style="font-weight:600;color:#fff">' + g.name + '</td>' +
            '<td>' + g.artists.join(', ') + '</td>' +
            '<td style="font-size:0.78rem">' + g.venue + '</td>' +
            '<td><div class="dash-ticket-bar"><div class="dash-ticket-track"><div class="dash-ticket-fill" style="width:' + pct + '%"></div></div>' + pct + '%</div></td>' +
            '<td><span class="badge ' + badgeColor + '">' + g.status + '</span></td>';
        gigsBody.appendChild(tr);
    });

    var stages = {};
    data.opportunities.forEach(function(o) {
        stages[o.stage] = (stages[o.stage] || 0) + 1;
    });
    var pipelineEl = document.getElementById('dash-pipeline');
    var stageOrder = ['New Lead', 'Qualified', 'Simulation Needed', 'Negotiation', 'Contract Pending'];
    stageOrder.forEach(function(s) {
        if (stages[s]) {
            var row = document.createElement('div');
            row.className = 'dash-pipeline-row';
            row.innerHTML = '<span class="dash-pipeline-stage">' + s + '</span><span class="dash-pipeline-count">' + stages[s] + '</span>';
            pipelineEl.appendChild(row);
        }
    });

    var revChart = document.getElementById('dash-rev-chart');
    var maxRev = 0;
    m.monthlyRevenue.forEach(function(r) { if (r.value > maxRev) maxRev = r.value; });
    m.monthlyRevenue.forEach(function(r) {
        var pct = maxRev > 0 ? Math.round((r.value / maxRev) * 100) : 0;
        var col = document.createElement('div');
        col.className = 'dash-rev-col';
        col.innerHTML = '<div class="dash-rev-val">' + h.formatCurrency(r.value) + '</div>' +
            '<div class="dash-rev-bar" style="height:' + pct + '%"></div>' +
            '<div class="dash-rev-label">' + r.month + '</div>';
        revChart.appendChild(col);
    });

    var momentumEl = document.getElementById('dash-artist-momentum');
    var sortedArtists = data.artists.slice().sort(function(a, b) { return b.growthScore - a.growthScore; });
    sortedArtists.forEach(function(a) {
        var color = h.getScoreColor(a.growthScore);
        var row = document.createElement('div');
        row.className = 'dash-artist-row';
        row.innerHTML = '<div class="dash-artist-avatar" style="background:' + a.avatarColor + '">' + a.name.charAt(0) + '</div>' +
            '<div class="dash-artist-name">' + a.name + '</div>' +
            '<div class="score-bar" style="flex:1"><div class="score-bar-track"><div class="score-bar-fill" style="width:' + a.growthScore + '%;background:' + color + '"></div></div><div class="score-bar-value" style="color:' + color + '">' + a.growthScore + '</div></div>' +
            '<div class="dash-artist-trend">' + a.socialTrend + '</div>';
        momentumEl.appendChild(row);
    });

    var actionsEl = document.getElementById('dash-actions');
    var actions = [];
    data.alerts.forEach(function(a) {
        if (a.type === 'danger' || a.type === 'warning') {
            actions.push({ text: a.message.split(' — ')[0], source: a.category, priority: a.priority === 'high' ? 0 : 1 });
        }
    });
    data.opportunities.forEach(function(o) {
        if (o.nextAction) {
            actions.push({ text: o.nextAction + ' — ' + o.name, source: 'pipeline', priority: o.leadScore > 90 ? 0 : 1 });
        }
    });
    actions.sort(function(a, b) { return a.priority - b.priority; });
    actions.slice(0, 5).forEach(function(a) {
        var li = document.createElement('li');
        li.innerHTML = '<div class="dash-action-bullet"></div><div><div>' + a.text + '</div><div class="dash-action-source">' + a.source + '</div></div>';
        actionsEl.appendChild(li);
    });
})();
</script>
</body>
</html>
