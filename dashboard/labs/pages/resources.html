<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resource Library — LABS Institute</title>
<style>
    .resource-card {
        position: relative;
        border-left: 3px solid var(--border-medium);
        transition: transform 0.15s, border-color 0.15s;
    }

    .resource-card:hover {
        transform: translateY(-2px);
    }

    .resource-card.format-pdf {
        border-left-color: var(--accent-red);
    }

    .resource-card.format-docx {
        border-left-color: var(--accent-blue);
    }

    .resource-card.format-xlsx {
        border-left-color: var(--accent-green);
    }

    .resource-card.format-zip {
        border-left-color: var(--accent-purple);
    }

    .resource-card-header {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 12px;
    }

    .resource-icon {
        width: 38px;
        height: 38px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.62rem;
        font-weight: 800;
        color: #fff;
        letter-spacing: 0.3px;
        flex-shrink: 0;
        text-transform: uppercase;
    }

    .resource-icon.pdf {
        background: rgba(248,113,113,0.2);
        color: var(--accent-red);
    }

    .resource-icon.docx {
        background: rgba(56,189,248,0.2);
        color: var(--accent-blue);
    }

    .resource-icon.xlsx {
        background: rgba(74,222,128,0.2);
        color: var(--accent-green);
    }

    .resource-icon.zip {
        background: rgba(167,139,250,0.2);
        color: var(--accent-purple);
    }

    .resource-name {
        font-size: 0.88rem;
        font-weight: 700;
        color: #fff;
        line-height: 1.3;
        flex: 1;
        min-width: 0;
    }

    .resource-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 10px;
    }

    .resource-date {
        font-size: 0.72rem;
        color: var(--text-dim);
        font-family: var(--font-mono);
    }

    .resource-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 10px;
        border-top: 1px solid var(--border-subtle);
    }

    @media (max-width: 1024px) {
        .labs-grid-3 {
            grid-template-columns: 1fr 1fr;
        }
    }

    @media (max-width: 768px) {
        .labs-grid-3 {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>
<body>
<div class="labs-page">
    <div class="labs-page-header">
        <div>
            <div class="labs-page-title">Resource Library</div>
            <div class="labs-page-subtitle" id="resource-subtitle"></div>
        </div>
    </div>

    <div class="labs-tabs" id="resource-tabs">
        <div class="labs-tab active" data-category="all">All</div>
        <div class="labs-tab" data-category="contracts">Contracts</div>
        <div class="labs-tab" data-category="marketing">Marketing</div>
        <div class="labs-tab" data-category="riders">Riders</div>
        <div class="labs-tab" data-category="brand">Brand</div>
        <div class="labs-tab" data-category="onboarding">Onboarding/SOPs</div>
    </div>

    <div class="labs-grid-3" id="resource-grid"></div>
</div>

<script>
(function() {
    var resources = window.LabsData.resources || [];
    var helpers = window.LabsHelpers;
    var activeCategory = 'all';

    var formatColors = {
        PDF: { cls: 'pdf', badge: 'red' },
        DOCX: { cls: 'docx', badge: 'blue' },
        XLSX: { cls: 'xlsx', badge: 'green' },
        ZIP: { cls: 'zip', badge: 'purple' }
    };

    function getFormatInfo(format) {
        return formatColors[format] || { cls: '', badge: '' };
    }

    function filterResources(category) {
        if (category === 'all') return resources;
        return resources.filter(function(r) { return r.category === category; });
    }

    function renderGrid() {
        var filtered = filterResources(activeCategory);
        var gridEl = document.getElementById('resource-grid');
        var subtitleEl = document.getElementById('resource-subtitle');

        subtitleEl.textContent = filtered.length + ' resource' + (filtered.length !== 1 ? 's' : '') + (activeCategory === 'all' ? ' total' : ' in ' + activeCategory);

        if (filtered.length === 0) {
            gridEl.innerHTML = '<div class="empty-state" style="grid-column:1/-1">' +
                '<h3>No Resources Found</h3>' +
                '<p>No resources match the selected category.</p>' +
                '</div>';
            return;
        }

        gridEl.innerHTML = filtered.map(function(r) {
            var fi = getFormatInfo(r.format);

            var html = '<div class="card card-hover resource-card format-' + fi.cls + '">';

            html += '<div class="resource-card-header">';
            html += '<div class="resource-icon ' + fi.cls + '">' + r.format + '</div>';
            html += '<div class="resource-name">' + r.name + '</div>';
            html += '</div>';

            html += '<div class="resource-meta">';
            html += '<span class="tag">' + r.type + '</span>';
            html += '<span class="tag ' + fi.badge + '">' + r.format + '</span>';
            html += '</div>';

            html += '<div class="resource-footer">';
            html += '<span class="resource-date">' + helpers.formatDate(r.updatedAt) + '</span>';
            html += '<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation()">Download</button>';
            html += '</div>';

            html += '</div>';
            return html;
        }).join('');
    }

    function initTabs() {
        var tabsEl = document.getElementById('resource-tabs');
        tabsEl.addEventListener('click', function(e) {
            var tab = e.target.closest('.labs-tab');
            if (!tab) return;

            var tabs = tabsEl.querySelectorAll('.labs-tab');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove('active');
            }
            tab.classList.add('active');

            activeCategory = tab.getAttribute('data-category');
            renderGrid();
        });
    }

    initTabs();
    renderGrid();
})();
</script>
</body>
</html>
