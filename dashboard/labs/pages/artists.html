<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Roster — LABS Institute</title>
    <style>
        .artist-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .artist-card {
            background: var(--card-gradient);
            border: 1px solid var(--border-medium);
            border-radius: var(--card-radius);
            padding: 20px;
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s;
        }

        .artist-card:hover {
            transform: translateY(-2px);
            border-color: rgba(167,139,250,0.3);
        }

        .artist-card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .artist-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 800;
            color: #fff;
            flex-shrink: 0;
            letter-spacing: 0.5px;
        }

        .artist-card-identity {
            flex: 1;
            min-width: 0;
        }

        .artist-card-name {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
        }

        .artist-card-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .artist-card-badges {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .artist-card-fee {
            font-size: 0.78rem;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            margin: 10px 0 8px;
        }

        .artist-card-growth {
            margin: 10px 0;
        }

        .artist-card-growth-label {
            font-size: 0.68rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 4px;
        }

        .artist-card-stats {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 10px 0;
        }

        .artist-card-onboarding {
            margin: 10px 0 6px;
        }

        .onboarding-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.68rem;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .onboarding-track {
            height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
        }

        .onboarding-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--accent-purple);
            transition: width 0.8s ease;
        }

        .artist-card-action {
            font-size: 0.75rem;
            color: var(--accent-blue);
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .artist-card-action svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .artist-card-territories {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .detail-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5,10,16,0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 400;
            display: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .detail-overlay.open {
            display: block;
            opacity: 1;
        }

        .detail-panel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 560px;
            max-width: 92vw;
            background: linear-gradient(180deg, #12202e, #0d1820);
            border-left: 1px solid var(--border-medium);
            z-index: 401;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.25s cubic-bezier(0.22,1,0.36,1);
            padding: 24px;
        }

        .detail-overlay.open .detail-panel {
            transform: translateX(0);
        }

        .detail-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border-medium);
            border-radius: 8px;
            color: var(--text-muted);
            padding: 6px 10px;
            cursor: pointer;
            font-size: 0.78rem;
            font-family: var(--font-family);
        }

        .detail-close:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding-right: 60px;
        }

        .detail-avatar {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
            flex-shrink: 0;
        }

        .detail-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
        }

        .detail-real-name {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .detail-section {
            margin-bottom: 20px;
        }

        .detail-section-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.8rem;
        }

        .detail-row-label {
            color: var(--text-dim);
        }

        .detail-row-val {
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 0.78rem;
        }

        .detail-bio {
            font-size: 0.82rem;
            color: var(--text-body);
            line-height: 1.7;
            margin-bottom: 16px;
        }

        .assets-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .asset-item {
            text-align: center;
            padding: 10px 6px;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-subtle);
        }

        .asset-value {
            font-size: 1rem;
            font-weight: 700;
            font-family: var(--font-mono);
            color: var(--text-secondary);
        }

        .asset-value.yes {
            color: var(--accent-green);
        }

        .asset-value.no {
            color: var(--accent-red);
        }

        .asset-label {
            font-size: 0.62rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 4px;
        }

        .timeline-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .timeline-item:last-child {
            border-bottom: none;
        }

        .timeline-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 5px;
            flex-shrink: 0;
        }

        .timeline-dot.release {
            background: var(--accent-purple);
        }

        .timeline-dot.gig {
            background: var(--accent-blue);
        }

        .timeline-dot.mix {
            background: var(--accent-green);
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-title {
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .timeline-date {
            font-size: 0.72rem;
            color: var(--text-dim);
            font-family: var(--font-mono);
            margin-top: 2px;
        }

        .detail-territories {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .detail-analytics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .detail-analytics-item {
            padding: 10px 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-subtle);
        }

        .detail-analytics-val {
            font-size: 1rem;
            font-weight: 700;
            font-family: var(--font-mono);
            color: var(--text-primary);
        }

        .detail-analytics-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 2px;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .checklist-check {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.68rem;
        }

        .checklist-check.done {
            background: rgba(74,222,128,0.15);
            color: var(--accent-green);
        }

        .checklist-check.pending {
            background: rgba(255,255,255,0.06);
            color: var(--text-dim);
        }

        @media (max-width: 1024px) {
            .artist-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="labs-page">
        <div class="labs-page-header">
            <div>
                <div class="labs-page-title">Artist Roster</div>
                <div class="labs-page-subtitle">5 artists managed</div>
            </div>
        </div>

        <div class="artist-grid" id="artist-grid"></div>
    </div>

    <div class="detail-overlay" id="artist-detail-overlay">
        <div class="detail-panel" id="artist-detail-panel">
            <button class="detail-close" onclick="window._artistsPage.closeDetail()">Close</button>
            <div id="artist-detail-content"></div>
        </div>
    </div>

    <script>
    (function() {
        var artists = window.LabsData.artists;
        var helpers = window.LabsHelpers;

        function getInitials(name) {
            return name.split(' ').map(function(w) { return w[0]; }).join('').substring(0, 2).toUpperCase();
        }

        function formatNumber(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'K';
            return n.toString();
        }

        function renderGrid() {
            var grid = document.getElementById('artist-grid');
            grid.innerHTML = artists.map(function(a) {
                var scoreColor = helpers.getScoreColor(a.growthScore);
                var availBadge = helpers.getStatusBadge(a.availability);
                var stageBadge = a.careerStage === 'Emerging' ? 'green' : a.careerStage === 'Rising' ? 'blue' : 'purple';
                var feeStr = helpers.formatCurrency(a.feeRange[0]) + ' — ' + helpers.formatCurrency(a.feeRange[1]);

                var html = '<div class="artist-card" onclick="window._artistsPage.openDetail(\'' + a.id + '\')">';

                html += '<div class="artist-card-header">';
                html += '<div class="artist-avatar" style="background:' + a.avatarColor + '">' + getInitials(a.name) + '</div>';
                html += '<div class="artist-card-identity">';
                html += '<div class="artist-card-name">' + a.name + '</div>';
                html += '<div class="artist-card-meta">' + a.location + ' &middot; ' + a.genre + '</div>';
                html += '</div>';
                html += '<div class="artist-card-badges">';
                html += '<span class="badge ' + stageBadge + '">' + a.careerStage + '</span>';
                html += '<span class="badge ' + availBadge + '">' + a.availability + '</span>';
                html += '</div>';
                html += '</div>';

                html += '<div class="artist-card-fee">' + feeStr + '</div>';

                html += '<div class="artist-card-growth">';
                html += '<div class="artist-card-growth-label">Growth Score</div>';
                html += '<div class="score-bar">';
                html += '<div class="score-bar-track"><div class="score-bar-fill" style="width:' + a.growthScore + '%;background:' + scoreColor + '"></div></div>';
                html += '<div class="score-bar-value" style="color:' + scoreColor + '">' + a.growthScore + '</div>';
                html += '</div>';
                html += '</div>';

                html += '<div class="artist-card-stats">';
                html += '<span class="stat-chip">Social ' + formatNumber(a.socialReach) + '</span>';
                html += '<span class="stat-chip">Streams ' + formatNumber(a.streamingMonthly) + '/mo</span>';
                html += '<span class="stat-chip">Gigs ' + a.recentGigs + '</span>';
                html += '</div>';

                html += '<div class="artist-card-onboarding">';
                html += '<div class="onboarding-label"><span>Onboarding</span><span>' + a.onboardingComplete + '%</span></div>';
                html += '<div class="onboarding-track"><div class="onboarding-fill" style="width:' + a.onboardingComplete + '%"></div></div>';
                html += '</div>';

                html += '<div class="artist-card-action">';
                html += '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>';
                html += a.nextAction;
                html += '</div>';

                html += '<div class="artist-card-territories">';
                a.territories.forEach(function(t) {
                    html += '<span class="tag">' + t + '</span>';
                });
                html += '</div>';

                html += '</div>';
                return html;
            }).join('');
        }

        function openDetail(artistId) {
            var a = artists.find(function(x) { return x.id === artistId; });
            if (!a) return;

            var scoreColor = helpers.getScoreColor(a.growthScore);
            var stageBadge = a.careerStage === 'Emerging' ? 'green' : a.careerStage === 'Rising' ? 'blue' : 'purple';
            var availBadge = helpers.getStatusBadge(a.availability);

            var html = '';

            html += '<div class="detail-header">';
            html += '<div class="detail-avatar" style="background:' + a.avatarColor + '">' + getInitials(a.name) + '</div>';
            html += '<div>';
            html += '<div class="detail-name">' + a.name + '</div>';
            html += '<div class="detail-real-name">' + a.realName + ' &middot; ' + a.location + '</div>';
            html += '</div>';
            html += '</div>';

            html += '<div class="detail-bio">' + a.bio + '</div>';

            html += '<div class="detail-section">';
            html += '<div class="detail-section-title">Profile</div>';
            html += '<div class="detail-row"><span class="detail-row-label">Genre</span><span class="detail-row-val">' + a.genre + ' / ' + a.subgenre + '</span></div>';
            html += '<div class="detail-row"><span class="detail-row-label">Career Stage</span><span><span class="badge ' + stageBadge + '">' + a.careerStage + '</span></span></div>';
            html += '<div class="detail-row"><span class="detail-row-label">Availability</span><span><span class="badge ' + availBadge + '">' + a.availability + '</span></span></div>';
            html += '<div class="detail-row"><span class="detail-row-label">Fee Range</span><span class="detail-row-val">' + helpers.formatCurrency(a.feeRange[0]) + ' — ' + helpers.formatCurrency(a.feeRange[1]) + '</span></div>';
            html += '<div class="detail-row"><span class="detail-row-label">Risk Level</span><span class="detail-row-val">' + a.riskLevel + '</span></div>';
            html += '</div>';

            html += '<div class="detail-section">';
            html += '<div class="detail-section-title">Growth Analytics</div>';
            html += '<div class="detail-analytics-grid">';
            html += '<div class="detail-analytics-item"><div class="detail-analytics-val" style="color:' + scoreColor + '">' + a.growthScore + '</div><div class="detail-analytics-label">Growth Score</div></div>';
            html += '<div class="detail-analytics-item"><div class="detail-analytics-val">' + a.socialTrend + '</div><div class="detail-analytics-label">Social Trend</div></div>';
            html += '<div class="detail-analytics-item"><div class="detail-analytics-val">' + formatNumber(a.socialReach) + '</div><div class="detail-analytics-label">Social Reach</div></div>';
            html += '<div class="detail-analytics-item"><div class="detail-analytics-val">' + formatNumber(a.streamingMonthly) + '</div><div class="detail-analytics-label">Monthly Streams</div></div>';
            html += '<div class="detail-analytics-item"><div class="detail-analytics-val">' + a.recentGigs + '</div><div class="detail-analytics-label">Recent Gigs</div></div>';
            html += '<div class="detail-analytics-item"><div class="detail-analytics-val">' + a.upcomingGigs + '</div><div class="detail-analytics-label">Upcoming Gigs</div></div>';
            html += '</div>';
            html += '</div>';

            html += '<div class="detail-section">';
            html += '<div class="detail-section-title">Assets</div>';
            html += '<div class="assets-grid">';
            html += '<div class="asset-item"><div class="asset-value">' + a.assets.photos + '</div><div class="asset-label">Photos</div></div>';
            html += '<div class="asset-item"><div class="asset-value">' + a.assets.mixes + '</div><div class="asset-label">Mixes</div></div>';
            html += '<div class="asset-item"><div class="asset-value">' + a.assets.videos + '</div><div class="asset-label">Videos</div></div>';
            html += '<div class="asset-item"><div class="asset-value ' + (a.assets.epk ? 'yes' : 'no') + '">' + (a.assets.epk ? '&#10003;' : '&#10007;') + '</div><div class="asset-label">EPK</div></div>';
            html += '<div class="asset-item"><div class="asset-value ' + (a.assets.rider ? 'yes' : 'no') + '">' + (a.assets.rider ? '&#10003;' : '&#10007;') + '</div><div class="asset-label">Rider</div></div>';
            html += '</div>';
            html += '</div>';

            var onboardingItems = [
                { label: 'Profile complete', done: true },
                { label: 'Photos uploaded', done: a.assets.photos >= 5 },
                { label: 'Mixes uploaded', done: a.assets.mixes >= 3 },
                { label: 'EPK created', done: a.assets.epk },
                { label: 'Rider submitted', done: a.assets.rider },
                { label: 'Bio approved', done: true },
                { label: 'Contracts signed', done: a.onboardingComplete >= 85 },
                { label: 'First gig booked', done: a.recentGigs > 0 }
            ];

            html += '<div class="detail-section">';
            html += '<div class="detail-section-title">Onboarding Checklist</div>';
            html += '<div class="onboarding-label" style="margin-bottom:8px"><span>Progress</span><span>' + a.onboardingComplete + '%</span></div>';
            html += '<div class="onboarding-track" style="margin-bottom:12px"><div class="onboarding-fill" style="width:' + a.onboardingComplete + '%"></div></div>';
            onboardingItems.forEach(function(item) {
                html += '<div class="checklist-item">';
                html += '<div class="checklist-check ' + (item.done ? 'done' : 'pending') + '">' + (item.done ? '&#10003;' : '&mdash;') + '</div>';
                html += '<span' + (item.done ? '' : ' style="color:var(--text-dim)"') + '>' + item.label + '</span>';
                html += '</div>';
            });
            html += '</div>';

            html += '<div class="detail-section">';
            html += '<div class="detail-section-title">Recent Activity</div>';
            a.recentActivity.forEach(function(act) {
                html += '<div class="timeline-item">';
                html += '<div class="timeline-dot ' + act.type + '"></div>';
                html += '<div class="timeline-content">';
                html += '<div class="timeline-title">' + act.title + '</div>';
                html += '<div class="timeline-date">' + helpers.formatDate(act.date) + '</div>';
                html += '</div>';
                html += '</div>';
            });
            html += '</div>';

            html += '<div class="detail-section">';
            html += '<div class="detail-section-title">Territories</div>';
            html += '<div class="detail-territories">';
            a.territories.forEach(function(t) {
                html += '<span class="tag purple">' + t + '</span>';
            });
            html += '</div>';
            html += '</div>';

            html += '<div class="detail-section">';
            html += '<div class="detail-section-title">Next Action</div>';
            html += '<div style="font-size:0.85rem;color:var(--accent-blue)">' + a.nextAction + '</div>';
            html += '</div>';

            document.getElementById('artist-detail-content').innerHTML = html;
            document.getElementById('artist-detail-overlay').classList.add('open');
        }

        function closeDetail() {
            document.getElementById('artist-detail-overlay').classList.remove('open');
        }

        document.getElementById('artist-detail-overlay').addEventListener('click', function(e) {
            if (e.target === this) closeDetail();
        });

        window._artistsPage = {
            openDetail: openDetail,
            closeDetail: closeDetail
        };

        renderGrid();
    })();
    </script>
</body>
</html>
