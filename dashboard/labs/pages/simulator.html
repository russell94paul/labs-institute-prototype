<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Simulator</title>
<style>
.sim-controls {
    display: flex;
    gap: 16px;
    align-items: flex-end;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

.sim-controls .form-group {
    margin-bottom: 0;
    min-width: 240px;
    flex: 1;
}

.sim-scenario-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

.comparison-card .card-title {
    font-size: 1rem;
    margin-bottom: 14px;
}

.sim-kpi-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 16px;
}

.sim-kpi {
    text-align: center;
    padding: 10px 6px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    border: 1px solid var(--border-subtle);
}

.sim-kpi-val {
    font-size: 1.1rem;
    font-weight: 800;
    font-family: var(--font-mono);
    line-height: 1;
    color: #fff;
}

.sim-kpi-label {
    font-size: 0.6rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 4px;
}

.sim-scores {
    margin-bottom: 16px;
}

.sim-score-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
}

.sim-score-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    min-width: 110px;
    flex-shrink: 0;
}

.sim-details-section {
    margin-bottom: 10px;
}

.sim-details-heading {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
}

.sim-details-list {
    list-style: none;
    padding: 0;
    margin: 0;
}

.sim-details-list li {
    font-size: 0.78rem;
    color: var(--text-body);
    padding: 2px 0;
    padding-left: 14px;
    position: relative;
    line-height: 1.6;
}

.sim-details-list li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 9px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
}

.sim-details-list.pros li::before { background: var(--accent-green); }
.sim-details-list.cons li::before { background: var(--accent-red); }
.sim-details-list.tradeoffs li::before { background: var(--accent-amber); }

.sim-tradeoff-text {
    font-size: 0.78rem;
    color: var(--text-body);
    line-height: 1.6;
    padding-left: 2px;
}

.sim-composite {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    border: 1px solid var(--border-subtle);
    margin-top: 14px;
}

.sim-composite-label {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
}

.sim-composite-val {
    font-size: 1.3rem;
    font-weight: 900;
    font-family: var(--font-mono);
}

.comparison-card.recommended .sim-composite {
    background: rgba(167,139,250,0.08);
    border-color: rgba(167,139,250,0.2);
}

.comparison-card.recommended .sim-composite-val {
    color: var(--accent-purple);
}

.sim-confidence {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    font-weight: 700;
    font-family: var(--font-mono);
    padding: 4px 10px;
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
}

.ai-rec-title {
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
}

.ai-rec-confidence {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 4px 12px;
    border-radius: 6px;
    background: rgba(167,139,250,0.1);
    font-size: 0.72rem;
    font-weight: 700;
    font-family: var(--font-mono);
    color: var(--accent-purple);
}

.sim-divider {
    border: none;
    border-top: 1px solid var(--border-subtle);
    margin: 12px 0;
}

@media (max-width: 1024px) {
    .sim-scenario-grid {
        grid-template-columns: 1fr;
    }
    .sim-kpi-row {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 768px) {
    .sim-controls {
        flex-direction: column;
    }
    .sim-controls .form-group {
        min-width: 100%;
    }
    .sim-kpi-row {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>
<body>
<div class="labs-page">
    <div class="labs-page-header">
        <div>
            <div class="labs-page-title">Master Simulator</div>
            <div class="labs-page-subtitle">Model scenario outcomes and find the optimal strategy for every opportunity</div>
        </div>
    </div>

    <div class="sim-controls">
        <div class="form-group">
            <label class="form-label">Opportunity</label>
            <select class="form-select" id="sim-opp-select"></select>
        </div>
        <div class="form-group">
            <label class="form-label">Optimization Goal</label>
            <select class="form-select" id="sim-goal-select">
                <option value="Balanced">Balanced</option>
                <option value="Maximize ROI">Maximize ROI</option>
                <option value="Maximize Artist Growth">Maximize Artist Growth</option>
                <option value="Maximize Brand Visibility">Maximize Brand Visibility</option>
                <option value="Reduce Risk">Reduce Risk</option>
                <option value="Maximize Client Satisfaction">Maximize Client Satisfaction</option>
            </select>
        </div>
    </div>

    <div id="sim-ai-rec"></div>
    <div id="sim-grid"></div>
</div>

<script>
(function() {
    var data = window.LabsData;
    var helpers = window.LabsHelpers;

    var oppSelect = document.getElementById('sim-opp-select');
    var goalSelect = document.getElementById('sim-goal-select');
    var aiRecEl = document.getElementById('sim-ai-rec');
    var gridEl = document.getElementById('sim-grid');

    var oppsWithScenarios = data.opportunities.filter(function(o) {
        return data.scenarios.some(function(s) { return s.opportunityId === o.id; });
    });

    oppsWithScenarios.forEach(function(o) {
        var opt = document.createElement('option');
        opt.value = o.id;
        opt.textContent = o.name;
        if (o.id === 'opp_001') opt.selected = true;
        oppSelect.appendChild(opt);
    });

    function getGoalSummaries(goal) {
        var summaries = {
            'Balanced': {
                verb: 'balance',
                explanation: 'Weights are distributed evenly across ROI, artist growth, brand visibility, risk mitigation, and marketing impact to find the most well-rounded option.'
            },
            'Maximize ROI': {
                verb: 'maximize return on investment',
                explanation: 'Heavily weights financial return and profit margin, with secondary consideration for risk mitigation and moderate weight on growth potential.'
            },
            'Maximize Artist Growth': {
                verb: 'maximize artist development potential',
                explanation: 'Prioritizes roster development and artist career advancement, balanced with brand building and risk considerations.'
            },
            'Maximize Brand Visibility': {
                verb: 'maximize LABS brand exposure',
                explanation: 'Focuses on brand score and marketing impact, with supporting weight on artist growth to ensure aligned brand-artist narratives.'
            },
            'Reduce Risk': {
                verb: 'minimize execution and financial risk',
                explanation: 'Heavily weights low-risk scenarios, with secondary consideration for financial returns to ensure viable margins alongside safety.'
            },
            'Maximize Client Satisfaction': {
                verb: 'optimize for client relationship strength',
                explanation: 'Prioritizes client relationship score alongside risk mitigation and financial performance to ensure a repeatable, trust-building outcome.'
            }
        };
        return summaries[goal] || summaries['Balanced'];
    }

    function render() {
        var oppId = oppSelect.value;
        var goal = goalSelect.value;

        var opp = data.opportunities.find(function(o) { return o.id === oppId; });
        if (!opp) {
            aiRecEl.innerHTML = '';
            gridEl.innerHTML = '<div class="empty-state"><h3>No Opportunity Selected</h3><p>Select an opportunity with scenarios to simulate.</p></div>';
            return;
        }

        var scenarios = helpers.simulateScenarios(opp, goal);

        if (scenarios.length === 0) {
            aiRecEl.innerHTML = '';
            gridEl.innerHTML = '<div class="empty-state"><h3>No Scenarios Available</h3><p>No simulation scenarios have been created for this opportunity yet.</p></div>';
            return;
        }

        var top = scenarios[0];
        var goalInfo = getGoalSummaries(goal);

        aiRecEl.innerHTML =
            '<div class="ai-rec">' +
                '<div class="ai-rec-header">' +
                    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>' +
                    'AI Recommendation' +
                '</div>' +
                '<div class="ai-rec-body">' +
                    '<div class="ai-rec-title">' + escHtml(top.name) + '</div>' +
                    '<p style="margin:0">' +
                        escHtml(top.summary) +
                        ' When optimizing to <strong>' + escHtml(goalInfo.verb) + '</strong>, this scenario scores highest with a composite of <strong>' + top.compositeScore + '/100</strong>. ' +
                        escHtml(goalInfo.explanation) +
                    '</p>' +
                    '<div class="ai-rec-confidence">Confidence: ' + top.confidence + '%</div>' +
                '</div>' +
            '</div>';

        var cardsHtml = '<div class="sim-scenario-grid">';

        scenarios.forEach(function(s) {
            var isRec = s.recommended;
            var cls = 'comparison-card' + (isRec ? ' recommended' : '');
            var badgeHtml = isRec ? '<div class="comparison-card-badge">RECOMMENDED</div>' : '';

            var scoreBarHtml = function(label, value, maxVal, colorFn) {
                maxVal = maxVal || 100;
                var pct = Math.min((value / maxVal) * 100, 100);
                var color = colorFn ? colorFn(value) : helpers.getScoreColor(value);
                return '<div class="sim-score-row">' +
                    '<span class="sim-score-label">' + escHtml(label) + '</span>' +
                    '<div class="score-bar" style="flex:1">' +
                        '<div class="score-bar-track">' +
                            '<div class="score-bar-fill" style="width:' + pct + '%;background:' + color + '"></div>' +
                        '</div>' +
                        '<span class="score-bar-value" style="color:' + color + '">' + value + '</span>' +
                    '</div>' +
                '</div>';
            };

            var prosHtml = '';
            if (s.pros && s.pros.length) {
                prosHtml = '<div class="sim-details-section">' +
                    '<div class="sim-details-heading">Pros</div>' +
                    '<ul class="sim-details-list pros">' +
                    s.pros.map(function(p) { return '<li>' + escHtml(p) + '</li>'; }).join('') +
                    '</ul></div>';
            }

            var consHtml = '';
            if (s.cons && s.cons.length) {
                consHtml = '<div class="sim-details-section">' +
                    '<div class="sim-details-heading">Cons</div>' +
                    '<ul class="sim-details-list cons">' +
                    s.cons.map(function(c) { return '<li>' + escHtml(c) + '</li>'; }).join('') +
                    '</ul></div>';
            }

            var tradeoffHtml = '';
            if (s.tradeoffs) {
                tradeoffHtml = '<div class="sim-details-section">' +
                    '<div class="sim-details-heading">Trade-offs</div>' +
                    '<div class="sim-tradeoff-text">' + escHtml(s.tradeoffs) + '</div>' +
                '</div>';
            }

            var compositeColor = helpers.getScoreColor(s.compositeScore);

            cardsHtml +=
                '<div class="' + cls + '">' +
                    badgeHtml +
                    '<div class="card-title">' + escHtml(s.name) + '</div>' +

                    '<div class="sim-kpi-row">' +
                        kpiCell(helpers.formatCurrency(s.revenue), 'Revenue', '--accent-green') +
                        kpiCell(helpers.formatCurrency(s.cost), 'Cost', '--accent-red') +
                        kpiCell(helpers.formatCurrency(s.profit), 'Profit', '--accent-blue') +
                        kpiCell(s.roi.toFixed(1) + '%', 'ROI', '--accent-purple') +
                        kpiCell(s.profitMargin.toFixed(1) + '%', 'Margin', '--accent-amber') +
                    '</div>' +

                    '<div class="sim-scores">' +
                        scoreBarHtml('Artist Growth', s.artistGrowthScore, 100, helpers.getScoreColor) +
                        scoreBarHtml('Brand Score', s.brandScore, 100, helpers.getScoreColor) +
                        scoreBarHtml('Marketing Impact', s.marketingImpact, 100, helpers.getScoreColor) +
                        scoreBarHtml('Client Relationship', s.clientRelationship, 100, helpers.getScoreColor) +
                        scoreBarHtml('Risk', s.riskScore, 100, helpers.getRiskColor) +
                    '</div>' +

                    '<hr class="sim-divider">' +

                    prosHtml +
                    consHtml +
                    tradeoffHtml +

                    '<div class="sim-composite">' +
                        '<span class="sim-composite-label">Composite Score</span>' +
                        '<span class="sim-composite-val" style="color:' + compositeColor + '">' + s.compositeScore + '</span>' +
                    '</div>' +
                '</div>';
        });

        cardsHtml += '</div>';
        gridEl.innerHTML = cardsHtml;
    }

    function kpiCell(val, label, colorVar) {
        return '<div class="sim-kpi">' +
            '<div class="sim-kpi-val" style="color:var(' + colorVar + ')">' + val + '</div>' +
            '<div class="sim-kpi-label">' + label + '</div>' +
        '</div>';
    }

    function escHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    oppSelect.addEventListener('change', render);
    goalSelect.addEventListener('change', render);

    render();
})();
</script>
</body>
</html>
