<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Roadmap Builder</title>
<style>
.rm-list-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

.rm-card {
    background: var(--card-gradient);
    border: 1px solid var(--border-medium);
    border-radius: var(--card-radius);
    padding: 20px;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
}

.rm-card:hover {
    transform: translateY(-2px);
    border-color: rgba(167,139,250,0.3);
}

.rm-card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
}

.rm-card-title {
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
}

.rm-card-goal {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 12px;
}

.rm-card-progress {
    margin-bottom: 12px;
}

.rm-card-progress-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-bottom: 4px;
}

.rm-card-progress-track {
    height: 5px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
}

.rm-card-progress-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--accent-purple);
    transition: width 0.8s ease;
}

.rm-card-approval {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-bottom: 10px;
}

.rm-card-tasks {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
}

.rm-card-date {
    font-size: 0.68rem;
    color: var(--text-dim);
    font-family: var(--font-mono);
}

.wizard-body {
    min-height: 320px;
}

.wizard-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
    padding-top: 16px;
    border-top: 1px solid var(--border-subtle);
}

.type-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.type-option {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-medium);
    border-radius: 10px;
    padding: 18px 16px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
}

.type-option:hover {
    border-color: rgba(167,139,250,0.3);
    background: rgba(167,139,250,0.04);
}

.type-option.selected {
    border-color: var(--accent-purple);
    background: rgba(167,139,250,0.08);
    box-shadow: 0 0 0 1px var(--accent-purple);
}

.type-option-icon {
    font-size: 1.4rem;
    margin-bottom: 8px;
}

.type-option-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: #fff;
}

.type-option-desc {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 4px;
}

.goal-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.goal-option {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-medium);
    border-radius: 10px;
    padding: 18px 16px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
}

.goal-option:hover {
    border-color: rgba(167,139,250,0.3);
    background: rgba(167,139,250,0.04);
}

.goal-option.selected {
    border-color: var(--accent-purple);
    background: rgba(167,139,250,0.08);
    box-shadow: 0 0 0 1px var(--accent-purple);
}

.goal-option-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: #fff;
}

.goal-option-desc {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 4px;
}

.artist-select-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.artist-select-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-medium);
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
}

.artist-select-card:hover {
    border-color: rgba(167,139,250,0.3);
}

.artist-select-card.selected {
    border-color: var(--accent-purple);
    background: rgba(167,139,250,0.08);
    box-shadow: 0 0 0 1px var(--accent-purple);
}

.artist-select-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
}

.artist-select-avatar {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
}

.artist-select-name {
    font-size: 0.9rem;
    font-weight: 700;
    color: #fff;
}

.artist-select-meta {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 2px;
}

.artist-select-stats {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
}

.checkbox-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.radio-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.radio-option {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-medium);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
}

.radio-option:hover {
    border-color: rgba(167,139,250,0.3);
}

.radio-option.selected {
    border-color: var(--accent-purple);
    background: rgba(167,139,250,0.08);
    box-shadow: 0 0 0 1px var(--accent-purple);
}

.radio-option-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: #fff;
}

.radio-option-desc {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 3px;
}

.task-group {
    margin-bottom: 20px;
}

.task-group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border-subtle);
}

.task-group-title {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
}

.task-group-count {
    font-size: 0.68rem;
    font-family: var(--font-mono);
    color: var(--text-dim);
    background: rgba(255,255,255,0.06);
    padding: 2px 8px;
    border-radius: 8px;
}

.task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 0.82rem;
}

.task-item:last-child {
    border-bottom: none;
}

.task-item-title {
    flex: 1;
    color: var(--text-secondary);
}

.task-item-due {
    font-size: 0.72rem;
    font-family: var(--font-mono);
    color: var(--text-dim);
    min-width: 70px;
    text-align: right;
}

.summary-section {
    margin-bottom: 16px;
}

.summary-section-title {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border-subtle);
}

.summary-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 0.82rem;
}

.summary-row-label {
    color: var(--text-dim);
}

.summary-row-val {
    color: var(--text-secondary);
    font-weight: 600;
}

.summary-actions {
    display: flex;
    gap: 12px;
    margin-top: 20px;
}

.step-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
}

.step-desc {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 18px;
}

@media (max-width: 1024px) {
    .rm-list-grid {
        grid-template-columns: 1fr;
    }
    .type-grid, .goal-grid {
        grid-template-columns: 1fr 1fr;
    }
    .artist-select-grid {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 768px) {
    .type-grid, .goal-grid, .radio-grid, .form-row, .checkbox-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>
<div class="labs-page">
    <div id="rm-view-list">
        <div class="labs-page-header">
            <div>
                <div class="labs-page-title">AI Roadmap Builder</div>
                <div class="labs-page-subtitle">Plan and execute end-to-end roadmaps for gigs, artist growth, campaigns, and tours</div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="window._roadmapPage.showWizard()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New Roadmap
            </button>
        </div>
        <div class="rm-list-grid" id="rm-list-grid"></div>
    </div>

    <div id="rm-view-wizard" style="display:none">
        <div class="labs-page-header">
            <div>
                <div class="labs-page-title">New Roadmap</div>
                <div class="labs-page-subtitle" id="wizard-subtitle">Follow the guided steps to build your roadmap</div>
            </div>
            <button class="btn btn-back btn-sm" onclick="window._roadmapPage.showList()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Back to Roadmaps
            </button>
        </div>

        <div class="wizard-steps" id="wizard-steps"></div>
        <div id="wizard-ai-rec"></div>
        <div class="wizard-body" id="wizard-body"></div>
        <div class="wizard-nav" id="wizard-nav"></div>
    </div>
</div>

<script>
(function() {
    var data = window.LabsData;
    var helpers = window.LabsHelpers;

    var STEP_LABELS = [
        'Roadmap Type',
        'Goal',
        'Artist Selection',
        'Location & Event',
        'Pricing & Billing',
        'Contract Requirements',
        'Marketing Strategy',
        'Generated Tasks',
        'Approval'
    ];

    var TYPES = [
        { id: 'gig', name: 'Gig Roadmap', desc: 'End-to-end gig execution', icon: '\u{1F3B5}' },
        { id: 'artist_growth', name: 'Artist Growth', desc: 'Career development plan', icon: '\u{1F4C8}' },
        { id: 'marketing', name: 'Marketing Campaign', desc: 'Promotional strategy', icon: '\u{1F4E3}' },
        { id: 'tour', name: 'Tour Planning', desc: 'Multi-date tour logistics', icon: '\u{1F30D}' },
        { id: 'client_booking', name: 'Client Booking', desc: 'Client-facing booking flow', icon: '\u{1F91D}' },
        { id: 'release', name: 'Release Campaign', desc: 'Music release strategy', icon: '\u{1F4BF}' }
    ];

    var GOALS = [
        { id: 'maximize_profit', name: 'Maximize Profit', desc: 'Optimize for highest financial return' },
        { id: 'grow_artist', name: 'Grow Artist', desc: 'Prioritize artist career development' },
        { id: 'brand_visibility', name: 'Brand Visibility', desc: 'Maximize LABS brand exposure' },
        { id: 'enter_city', name: 'Enter New City', desc: 'Break into a new territory' },
        { id: 'win_client', name: 'Win Client', desc: 'Secure a new client relationship' },
        { id: 'reduce_risk', name: 'Reduce Risk', desc: 'Minimize execution and financial risk' }
    ];

    var MARKETING_OPTIONS = [
        { id: 'organic', name: 'Organic Only', desc: 'Social media and word-of-mouth with zero ad spend' },
        { id: 'paid_ads', name: 'Paid Ads', desc: 'Targeted social and display campaigns with allocated budget' },
        { id: 'artist_led', name: 'Artist-Led', desc: 'Leverage artist social channels and fan engagement' },
        { id: 'premium_brand', name: 'Premium Brand', desc: 'High-end brand campaign with professional creative' },
        { id: 'scene_partner', name: 'Scene Partner', desc: 'Collaborate with local promoters and media partners' },
        { id: 'release_tiein', name: 'Release Tie-In', desc: 'Coordinate with music release for maximum synergy' }
    ];

    var state = {
        currentStep: 0,
        visitedSteps: [0],
        type: null,
        goal: null,
        selectedArtists: [],
        location: { city: '', venue: '', capacity: '', eventType: '', date: '', audience: '' },
        pricing: { clientFee: '', artistFee: '', deposit: '', commission: '', paymentTerms: '30' },
        contracts: { performance: true, nda: false, rider: true, cancellation: true },
        marketing: null,
        tasks: []
    };

    function esc(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderList() {
        var grid = document.getElementById('rm-list-grid');
        var roadmaps = data.roadmaps;

        if (!roadmaps || roadmaps.length === 0) {
            grid.innerHTML = '<div class="empty-state"><h3>No Roadmaps Yet</h3><p>Create your first roadmap to get started.</p></div>';
            return;
        }

        grid.innerHTML = roadmaps.map(function(rm) {
            var pct = Math.round((rm.stepsCompleted / rm.totalSteps) * 100);
            var statusBadge = helpers.getStatusBadge(rm.status);
            var statusLabel = rm.status.replace(/_/g, ' ');
            var totalTasks = rm.tasks.internal + rm.tasks.artist + rm.tasks.client + rm.tasks.marketing + rm.tasks.contract;

            var approvalLabel = rm.approvalStatus === 'approved' ? 'Approved' :
                rm.approvalStatus === 'pending_internal' ? 'Pending Internal Review' :
                rm.approvalStatus === 'pending_client' ? 'Pending Client Review' : 'Not Submitted';

            var html = '<div class="rm-card">';
            html += '<div class="rm-card-head">';
            html += '<div><div class="rm-card-title">' + esc(rm.title) + '</div></div>';
            html += '<div style="display:flex;gap:6px;flex-shrink:0">';
            html += '<span class="badge purple">' + esc(rm.type.replace(' Roadmap', '')) + '</span>';
            html += '<span class="badge ' + statusBadge + '">' + esc(statusLabel) + '</span>';
            html += '</div>';
            html += '</div>';

            html += '<div class="rm-card-goal">' + esc(rm.goal) + '</div>';

            html += '<div class="rm-card-progress">';
            html += '<div class="rm-card-progress-label"><span>Progress</span><span>' + rm.stepsCompleted + ' / ' + rm.totalSteps + ' steps (' + pct + '%)</span></div>';
            html += '<div class="rm-card-progress-track"><div class="rm-card-progress-fill" style="width:' + pct + '%"></div></div>';
            html += '</div>';

            html += '<div class="rm-card-approval">Approval: ' + esc(approvalLabel) + '</div>';

            html += '<div class="rm-card-tasks">';
            if (rm.tasks.internal > 0) html += '<span class="tag blue">Internal ' + rm.tasks.internal + '</span>';
            if (rm.tasks.artist > 0) html += '<span class="tag purple">Artist ' + rm.tasks.artist + '</span>';
            if (rm.tasks.client > 0) html += '<span class="tag green">Client ' + rm.tasks.client + '</span>';
            if (rm.tasks.marketing > 0) html += '<span class="tag amber">Marketing ' + rm.tasks.marketing + '</span>';
            if (rm.tasks.contract > 0) html += '<span class="tag red">Contract ' + rm.tasks.contract + '</span>';
            html += '<span class="tag" style="margin-left:auto">' + totalTasks + ' total</span>';
            html += '</div>';

            html += '<div class="rm-card-date">Created ' + helpers.formatDate(rm.createdAt) + '</div>';
            html += '</div>';
            return html;
        }).join('');
    }

    function showList() {
        document.getElementById('rm-view-list').style.display = '';
        document.getElementById('rm-view-wizard').style.display = 'none';
    }

    function showWizard() {
        state.currentStep = 0;
        state.visitedSteps = [0];
        state.type = null;
        state.goal = null;
        state.selectedArtists = [];
        state.location = { city: '', venue: '', capacity: '', eventType: '', date: '', audience: '' };
        state.pricing = { clientFee: '', artistFee: '', deposit: '', commission: '', paymentTerms: '30' };
        state.contracts = { performance: true, nda: false, rider: true, cancellation: true };
        state.marketing = null;
        state.tasks = [];

        document.getElementById('rm-view-list').style.display = 'none';
        document.getElementById('rm-view-wizard').style.display = '';
        renderWizard();
    }

    function goToStep(idx) {
        if (idx < 0 || idx >= STEP_LABELS.length) return;
        if (idx > 0 && state.visitedSteps.indexOf(idx) === -1 && state.visitedSteps.indexOf(idx - 1) === -1) return;
        saveStepState();
        state.currentStep = idx;
        if (state.visitedSteps.indexOf(idx) === -1) state.visitedSteps.push(idx);
        if (idx === 7) generateTasks();
        renderWizard();
    }

    function saveStepState() {
        var step = state.currentStep;
        if (step === 3) {
            var f = function(id) { var el = document.getElementById(id); return el ? el.value : ''; };
            state.location.city = f('loc-city');
            state.location.venue = f('loc-venue');
            state.location.capacity = f('loc-capacity');
            state.location.eventType = f('loc-event-type');
            state.location.date = f('loc-date');
            state.location.audience = f('loc-audience');
        }
        if (step === 4) {
            var g = function(id) { var el = document.getElementById(id); return el ? el.value : ''; };
            state.pricing.clientFee = g('price-client-fee');
            state.pricing.artistFee = g('price-artist-fee');
            state.pricing.deposit = g('price-deposit');
            state.pricing.commission = g('price-commission');
            state.pricing.paymentTerms = g('price-terms');
        }
        if (step === 5) {
            var ids = ['contract-performance', 'contract-nda', 'contract-rider', 'contract-cancellation'];
            var keys = ['performance', 'nda', 'rider', 'cancellation'];
            for (var i = 0; i < ids.length; i++) {
                var el = document.getElementById(ids[i]);
                if (el) state.contracts[keys[i]] = el.checked;
            }
        }
    }

    function renderWizard() {
        renderSteps();
        renderAiRec();
        renderStepBody();
        renderNav();
    }

    function renderSteps() {
        var html = '';
        for (var i = 0; i < STEP_LABELS.length; i++) {
            var cls = 'wizard-step';
            if (i === state.currentStep) cls += ' active';
            else if (state.visitedSteps.indexOf(i) !== -1 && i < state.currentStep) cls += ' completed';
            var clickable = state.visitedSteps.indexOf(i) !== -1 || (i > 0 && state.visitedSteps.indexOf(i - 1) !== -1);
            html += '<div class="' + cls + '"' + (clickable ? ' onclick="window._roadmapPage.goToStep(' + i + ')"' : '') + '>';
            html += '<span class="wizard-step-num">' + (i + 1) + '</span>';
            html += '<span>' + STEP_LABELS[i] + '</span>';
            html += '</div>';
        }
        document.getElementById('wizard-steps').innerHTML = html;
    }

    function getAiRec() {
        var step = state.currentStep;
        var selectedArtists = state.selectedArtists.map(function(id) {
            return data.artists.find(function(a) { return a.id === id; });
        }).filter(Boolean);
        var hasEmerging = selectedArtists.some(function(a) { return a.careerStage === 'Emerging'; });
        var hasEstablished = selectedArtists.some(function(a) { return a.careerStage === 'Established'; });
        var highestGrowth = data.artists.slice().sort(function(a, b) { return b.growthScore - a.growthScore; })[0];

        if (step === 0) {
            return {
                title: 'Artist Growth',
                reasoning: 'No linked opportunity detected. Starting with an Artist Growth roadmap builds long-term roster value and helps identify which artists are ready for larger bookings.',
                tradeoffs: 'Artist Growth focuses on development over immediate revenue. If a specific gig or client is already in play, a Gig Roadmap or Client Booking may be more appropriate.',
                risk: 'Low risk. Growth roadmaps are internal-facing and do not create external commitments.'
            };
        }
        if (step === 1) {
            return {
                title: 'Grow Artist',
                reasoning: 'Roster development compounds over time. Prioritizing artist growth now leads to higher booking fees and stronger brand positioning in 6-12 months.',
                tradeoffs: 'Short-term profit may be lower than a pure revenue-maximizing approach, but artist career momentum creates sustainable pipeline value.',
                risk: 'Medium risk. Growth investment requires patience and may not produce immediate financial returns.'
            };
        }
        if (step === 2) {
            return {
                title: highestGrowth ? highestGrowth.name : 'Pulse Theory',
                reasoning: highestGrowth ? highestGrowth.name + ' has the highest growth score (' + highestGrowth.growthScore + ') in the roster with strong upward trajectory (' + highestGrowth.socialTrend + ' social trend). Best candidate for development investment.' : 'Highest growth potential in the roster.',
                tradeoffs: 'High-growth artists typically have less established audiences, which means lower guaranteed draw but higher ceiling for brand-building content.',
                risk: highestGrowth && highestGrowth.riskLevel === 'medium' ? 'Medium risk. Emerging artists may have incomplete assets (EPK, rider) that need resolution before external-facing work.' : 'Low risk. Artist has proven track record and reliable execution.'
            };
        }
        if (step === 3) {
            return {
                title: 'Dublin, IE or Berlin, DE',
                reasoning: 'Both cities offer strong electronic music audiences with existing LABS relationships. Dublin leverages home-market advantages with District 8. Berlin provides international credibility.',
                tradeoffs: 'Dublin is lower-cost and lower-risk but limited international visibility. Berlin has higher costs and logistics but stronger brand positioning for EU expansion.',
                risk: 'Low risk for Dublin (proven market). Medium risk for Berlin (travel logistics, competitive market).'
            };
        }
        if (step === 4) {
            var recFee = selectedArtists.length > 0 ?
                selectedArtists.reduce(function(sum, a) { return sum + a.feeRange[1]; }, 0) : 3000;
            return {
                title: 'Fee at ' + helpers.formatCurrency(Math.round(recFee * 1.3)) + ' with 20% commission',
                reasoning: 'Setting client fee at 1.3x combined artist fees ensures healthy margins while remaining competitive. A 20% commission is industry-standard for managed bookings.',
                tradeoffs: 'Higher fees improve margins but may reduce win rate on price-sensitive leads. Lower commissions attract artists but compress agency revenue.',
                risk: 'Low risk with 50% deposit. Ensure payment terms are net-30 or less to maintain cash flow.'
            };
        }
        if (step === 5) {
            return {
                title: 'Performance Agreement + Rider + Cancellation Terms',
                reasoning: 'These three documents cover the essential legal protections: performance obligations, technical requirements, and financial safeguards. NDAs are optional for standard bookings.',
                tradeoffs: 'More contract requirements slow down deal velocity. Fewer protections increase exposure to disputes and cancellations.',
                risk: 'Medium risk without cancellation terms. Always include cancellation clauses for events over ' + helpers.formatCurrency(5000) + '.'
            };
        }
        if (step === 6) {
            if (hasEmerging) {
                return {
                    title: 'Organic Artist-Led',
                    reasoning: 'For emerging artists, organic artist-led promotion builds authentic fan engagement and costs less. Artist social channels are the most effective growth lever at this career stage.',
                    tradeoffs: 'Slower reach than paid campaigns but builds genuine audience connection. Requires artist cooperation with content calendar.',
                    risk: 'Low financial risk. Execution risk depends on artist engagement with social content requirements.'
                };
            }
            if (hasEstablished) {
                return {
                    title: 'Premium Brand',
                    reasoning: 'Established artists have existing audiences that expect high-production marketing. Premium brand campaigns leverage their draw while elevating LABS positioning.',
                    tradeoffs: 'Higher budget requirement but stronger ROI on established audience. May overshadow emerging artists on the same bill.',
                    risk: 'Medium risk. Budget commitment is higher but audience conversion is more predictable.'
                };
            }
            return {
                title: 'Organic Artist-Led',
                reasoning: 'Default to organic artist-led promotion to minimize spend while testing audience response. Scale to paid campaigns once initial engagement metrics validate the approach.',
                tradeoffs: 'Lower upfront cost but slower reach. Paid amplification can be added later if organic metrics are strong.',
                risk: 'Low risk. Organic-first approach limits financial exposure while building content assets.'
            };
        }
        if (step === 7) {

                title: taskCount + ' tasks generated across 5 categories',

                tradeoffs: 'Auto-generated tasks cover standard workflows. You may need to add custom tasks for unique requirements or remove tasks that do not apply.',
                risk: 'Review high-priority tasks first. Missed contract and billing deadlines create the highest downstream risk.'
            };
        }
        if (step === 8) {
            return {
                title: 'Review and approve your roadmap',
                reasoning: 'All 8 configuration steps are complete. Review the summary below to confirm selections before submitting for approval or marking as approved.',
                tradeoffs: 'Approving immediately allows execution to begin. Sending for review adds oversight but delays start.',
                risk: 'No additional risk. Approval is a checkpoint, not a commitment to external parties.'
            };
        }
        return null;

    function generateTasks() {
        var tasks = [];
        var baseDate = state.location.date ? new Date(state.location.date) : new Date('2026-08-01');

        function addDays(d, n) {
            var r = new Date(d);
            r.setDate(r.getDate() + n);
            return r.toISOString().split('T')[0];
        }

        var typeName = '';
        TYPES.forEach(function(t) { if (t.id === state.type) typeName = t.name; });
        var goalName = '';
        GOALS.forEach(function(g) { if (g.id === state.goal) goalName = g.name; });
        var artistNames = state.selectedArtists.map(function(id) {
            var a = data.artists.find(function(x) { return x.id === id; });
            return a ? a.name : '';
        }).filter(Boolean);

        tasks.push({ title: 'Create project brief and timeline', owner: 'Internal LABS', due: addDays(baseDate, -56), priority: 'high' });
        tasks.push({ title: 'Confirm artist availability and fees', owner: 'Internal LABS', due: addDays(baseDate, -49), priority: 'high' });
        tasks.push({ title: 'Book venue and confirm hold dates', owner: 'Internal LABS', due: addDays(baseDate, -42), priority: 'high' });
        tasks.push({ title: 'Finalize budget and margin targets', owner: 'Internal LABS', due: addDays(baseDate, -40), priority: 'medium' });

        if (artistNames.length > 0) {
            tasks.push({ title: 'Confirm ' + artistNames[0] + ' set time and format', owner: 'Artist Portal', due: addDays(baseDate, -35), priority: 'high' });
        }
        tasks.push({ title: 'Collect updated press photos and bio', owner: 'Artist Portal', due: addDays(baseDate, -35), priority: 'medium' });
        tasks.push({ title: 'Submit technical rider', owner: 'Artist Portal', due: addDays(baseDate, -30), priority: 'medium' });

        tasks.push({ title: 'Send contract for client signature', owner: 'Client Portal', due: addDays(baseDate, -42), priority: 'high' });
        tasks.push({ title: 'Collect deposit payment', owner: 'Client Portal', due: addDays(baseDate, -35), priority: 'high' });
        tasks.push({ title: 'Confirm event logistics and access', owner: 'Client Portal', due: addDays(baseDate, -21), priority: 'medium' });

        var marketingLabel = '';
        MARKETING_OPTIONS.forEach(function(m) { if (m.id === state.marketing) marketingLabel = m.name; });

        tasks.push({ title: 'Design promotional artwork', owner: 'Marketing', due: addDays(baseDate, -28), priority: 'high' });
        tasks.push({ title: 'Launch ' + (marketingLabel || 'marketing') + ' campaign', owner: 'Marketing', due: addDays(baseDate, -21), priority: 'high' });
        tasks.push({ title: 'Schedule social media content calendar', owner: 'Marketing', due: addDays(baseDate, -21), priority: 'medium' });
        tasks.push({ title: 'Coordinate artist social media cross-promotion', owner: 'Marketing', due: addDays(baseDate, -14), priority: 'medium' });

        if (state.contracts.performance) {
            tasks.push({ title: 'Draft performance agreement', owner: 'Contract/Billing', due: addDays(baseDate, -49), priority: 'high' });
        }
        if (state.contracts.rider) {
            tasks.push({ title: 'Attach rider to contract package', owner: 'Contract/Billing', due: addDays(baseDate, -42), priority: 'medium' });
        }
        if (state.contracts.nda) {
            tasks.push({ title: 'Prepare and send NDA', owner: 'Contract/Billing', due: addDays(baseDate, -49), priority: 'medium' });
        }
        if (state.contracts.cancellation) {
            tasks.push({ title: 'Finalize cancellation and force majeure terms', owner: 'Contract/Billing', due: addDays(baseDate, -45), priority: 'high' });
        }
        tasks.push({ title: 'Issue final invoice and confirm balance', owner: 'Contract/Billing', due: addDays(baseDate, -7), priority: 'high' });

        if (state.goal === 'grow_artist' || state.goal === 'brand_visibility') {
            tasks.push({ title: 'Plan post-event content capture (photo/video)', owner: 'Marketing', due: addDays(baseDate, -7), priority: 'low' });
        }

        tasks.sort(function(a, b) { return a.due < b.due ? -1 : a.due > b.due ? 1 : 0; });
        state.tasks = tasks;
    }

        }

        if (step < STEP_LABELS.length - 1) {
            html += '<button class="btn btn-primary btn-sm" onclick="window._roadmapPage.goToStep(' + (step + 1) + ')">Next</button>';
        } else {
            html += '<div></div>';
        }

        nav.innerHTML = html;
    }

    function selectType(id) {
        state.type = id;
        renderStepBody();
    }

    function selectGoal(id) {
        state.goal = id;
        renderStepBody();
    }

    function toggleArtist(id) {
        var idx = state.selectedArtists.indexOf(id);
        if (idx === -1) state.selectedArtists.push(id);
        else state.selectedArtists.splice(idx, 1);
        renderStepBody();
    }

    function selectMarketing(id) {
        state.marketing = id;
        renderStepBody();
    }

    function approve() {
        showList();
    }

    function sendForReview() {
        showList();
    }

    window._roadmapPage = {
        showList: showList,
        showWizard: showWizard,
        goToStep: goToStep,
        selectType: selectType,
        selectGoal: selectGoal,
        toggleArtist: toggleArtist,
        selectMarketing: selectMarketing,
        approve: approve,
        sendForReview: sendForReview
    };

    renderList();
})();
</script>
</body>
</html>
