    <!-- Load mock data -->
    <script src="data/mock-data.js"></script>

    <!-- SPA Router -->
    <script>
    (function() {
        var routes = {
            'dashboard':     { path: 'pages/dashboard.html',     title: 'HQ Dashboard' },
            'artists':       { path: 'pages/artists.html',       title: 'Artist Roster' },
            'opportunities': { path: 'pages/opportunities.html', title: 'Opportunity Board' },
            'simulator':     { path: 'pages/simulator.html',     title: 'Master Simulator' },
            'roadmap':       { path: 'pages/roadmap.html',       title: 'AI Roadmap Builder' },
            'clients':       { path: 'pages/clients.html',       title: 'Client Portals' },
            'marketing':     { path: 'pages/marketing.html',     title: 'Marketing Control Center' },
            'contracts':     { path: 'pages/contracts.html',     title: 'Contracts & Billing' },
            'analytics':     { path: 'pages/analytics.html',     title: 'Analytics Overview' },
            'resources':     { path: 'pages/resources.html',     title: 'Resource Library' }
        };

        var currentRoute = null;
        var pageStylesEl = document.createElement('style');
        pageStylesEl.id = 'labs-page-styles';
        document.head.appendChild(pageStylesEl);

        function extractContent(html) {
            var styles = '';
            var bodyContent = '';
            var styleMatches = html.match(/<style[^>]*>([\s\S]*?)<\/style>/gi);
            if (styleMatches) {
                for (var i = 0; i < styleMatches.length; i++) {
                    styles += styleMatches[i].replace(/<\/?style[^>]*>/gi, '') + '\n';
                }
            }
            var bodyMatch = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
            if (bodyMatch) bodyContent = bodyMatch[1];

            var scripts = [];
            var scriptRe = /<script\b([^>]*)>([\s\S]*?)<\/script>/gi;
            var sm;
            while ((sm = scriptRe.exec(html)) !== null) {
                var attrs = sm[1] || '';
                var inline = sm[2] || '';
                var srcMatch = attrs.match(/\bsrc\s*=\s*["']([^"']+)["']/i);
                if (srcMatch) scripts.push({ src: srcMatch[1] });
                else if (inline.trim()) scripts.push({ code: inline });
            }
            return { styles: styles, body: bodyContent, scripts: scripts };
        }

        function updateNav(route) {
            document.querySelectorAll('.labs-nav-link[data-route]').forEach(function(l) {
                l.classList.toggle('active', l.dataset.route === route);
            });
            var info = routes[route];
            if (info) {
                document.getElementById('labs-header-title').textContent = info.title;
                document.title = info.title + ' — LABS Institute Growth OS';
            }
        }

        window.labsNavigate = function(route) {
            if (!routes[route]) return;
            if (route === currentRoute) return;
            currentRoute = route;
            window.location.hash = route;
            updateNav(route);

            var content = document.getElementById('labs-page-content');

            fetch(routes[route].path)
                .then(function(r) {
                    if (!r.ok) throw new Error('Not found');
                    return r.text();
                })
                .then(function(html) {
                    var parsed = extractContent(html);
                    pageStylesEl.textContent = parsed.styles;

                    var cleanBody = parsed.body.replace(/<script\b[^>]*>[\s\S]*?<\/script>/gi, '');
                    content.innerHTML = cleanBody;

                    document.querySelectorAll('#labs-page-content script').forEach(function(el) { el.remove(); });

                    parsed.scripts.forEach(function(s) {
                        var el = document.createElement('script');
                        if (s.src) el.src = s.src;
                        else el.textContent = s.code;
                        document.body.appendChild(el);
                    });
                })
                .catch(function() {
                    content.innerHTML = '<div class="labs-page"><div class="empty-state">' +
                        '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' +
                        '<h3>Page Not Found</h3><p>' + route + ' is not yet available.</p></div></div>';
                });
        };

        document.querySelectorAll('.labs-nav-link[data-route]').forEach(function(link) {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                window.labsNavigate(this.dataset.route);
            });
        });

        var hash = window.location.hash.replace('#', '').split('&')[0];
        window.labsNavigate(hash && routes[hash] ? hash : 'dashboard');

        window.addEventListener('hashchange', function() {
            var h = window.location.hash.replace('#', '').split('&')[0];
            if (h && routes[h] && h !== currentRoute) window.labsNavigate(h);
        });
    })();
    </script>
</body>
</html>
