<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
.an-kpi-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 24px;
}

.an-kpi {
    background: var(--card-gradient);
    border: 1px solid var(--border-medium);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
}

.an-kpi-val {
    font-size: 1.5rem;
    font-weight: 800;
    line-height: 1;
    color: #fff;
}

.an-kpi-label {
    font-size: 0.66rem;
    color: var(--text-label);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 6px;
}

.an-kpi-sub {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 3px;
    font-family: var(--font-mono);
}

.an-kpi-row.six {
    grid-template-columns: repeat(6, 1fr);
}

.an-section {
    margin-bottom: 24px;
}

.an-section-title {
    font-size: 0.88rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 12px;
}

.an-two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

.an-revenue-chart {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 140px;
    padding-top: 8px;
}

.an-rev-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
}

.an-rev-bar {
    width: 100%;
    border-radius: 3px 3px 0 0;
    background: linear-gradient(180deg, var(--accent-purple), rgba(167,139,250,0.3));
    transition: height 0.5s ease;
}

.an-rev-label {
    font-size: 0.62rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.04em;
}

.an-rev-val {
    font-size: 0.6rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
}

.an-artist-bar-track {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    overflow: hidden;
}

.an-artist-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
}

.an-progress-ring {
    display: flex;
    align-items: center;
    gap: 10px;
}

.an-progress-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
}

.an-progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
}

.an-ops-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.an-ops-card {
    background: var(--card-gradient);
    border: 1px solid var(--border-medium);
    border-radius: 10px;
    padding: 18px;
}

.an-ops-val {
    font-size: 1.8rem;
    font-weight: 800;
    line-height: 1;
}

.an-ops-label {
    font-size: 0.68rem;
    color: var(--text-label);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 6px;
    margin-bottom: 8px;
}

.an-ops-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    color: var(--text-dim);
    font-family: var(--font-mono);
}

.an-lead-hero {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
}

.an-lead-ring {
    width: 100px;
    height: 100px;
    position: relative;
    flex-shrink: 0;
}

.an-lead-ring svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
}

.an-lead-ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.06);
    stroke-width: 6;
}

.an-lead-ring-fill {
    fill: none;
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.8s ease;
}

.an-lead-ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    font-weight: 800;
    color: #fff;
}

.an-lead-detail {
    flex: 1;
}

.an-lead-detail-title {
    font-size: 0.88rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
}

.an-lead-detail-sub {
    font-size: 0.78rem;
    color: var(--text-muted);
    line-height: 1.6;
}

.an-tab-panel {
    display: none;
}

.an-tab-panel.active {
    display: block;
}

@media (max-width: 1024px) {
    .an-kpi-row {
        grid-template-columns: repeat(3, 1fr);
    }
    .an-kpi-row.six {
        grid-template-columns: repeat(3, 1fr);
    }
    .an-two-col {
        grid-template-columns: 1fr;
    }
    .an-ops-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 768px) {
    .an-kpi-row,
    .an-kpi-row.six {
        grid-template-columns: repeat(2, 1fr);
    }
    .an-ops-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>
<div class="labs-page">
    <div class="labs-page-header">
        <div>
            <div class="labs-page-title">Analytics Overview</div>
            <div class="labs-page-subtitle">Financial, growth, marketing, and operational analytics</div>
        </div>
    </div>

    <div class="labs-tabs" id="an-tabs"></div>

    <div id="an-tab-financial" class="an-tab-panel"></div>
    <div id="an-tab-artist-growth" class="an-tab-panel"></div>
    <div id="an-tab-marketing" class="an-tab-panel"></div>
    <div id="an-tab-operations" class="an-tab-panel"></div>
    <div id="an-tab-leads" class="an-tab-panel"></div>
</div>

<script>
(function() {
    var data = window.LabsData;
    var h = window.LabsHelpers;
    var m = data.metrics;

    var tabs = [
        { id: 'financial', label: 'Financial' },
        { id: 'artist-growth', label: 'Artist Growth' },
        { id: 'marketing', label: 'Marketing' },
        { id: 'operations', label: 'Operations' },
        { id: 'leads', label: 'Leads & Clients' }
    ];

    var tabsEl = document.getElementById('an-tabs');
    tabs.forEach(function(t, i) {
        var el = document.createElement('div');
        el.className = 'labs-tab' + (i === 0 ? ' active' : '');
        el.textContent = t.label;
        el.dataset.tab = t.id;
        el.addEventListener('click', function() {
            document.querySelectorAll('#an-tabs .labs-tab').forEach(function(tab) { tab.classList.remove('active'); });
            el.classList.add('active');
            document.querySelectorAll('.an-tab-panel').forEach(function(p) { p.classList.remove('active'); });
            document.getElementById('an-tab-' + t.id).classList.add('active');
        });
        tabsEl.appendChild(el);
    });

    var grossRevenue = 158000;
    var netProfit = 52300;
    var profitMargin = 33.1;
    var projectedRevenue = m.projectedRevenue;
    var unpaidDeposits = 23500;

    var finPanel = document.getElementById('an-tab-financial');
    finPanel.classList.add('active');

    var finKpis = '<div class="an-kpi-row">';
    var finKpiData = [
        { val: h.formatCurrency(grossRevenue), label: 'Gross Revenue', color: 'var(--accent-purple)' },
        { val: h.formatCurrency(netProfit), label: 'Net Profit', color: 'var(--accent-green)' },
        { val: profitMargin + '%', label: 'Profit Margin', color: 'var(--accent-blue)' },
        { val: h.formatCurrency(projectedRevenue), label: 'Projected Revenue', sub: 'full year', color: 'var(--accent-gold)' },
        { val: h.formatCurrency(unpaidDeposits), label: 'Unpaid Deposits', color: 'var(--accent-red)' }
    ];
    finKpiData.forEach(function(k) {
        finKpis += '<div class="an-kpi"><div class="an-kpi-val" style="color:' + k.color + '">' + k.val + '</div>' +
            '<div class="an-kpi-label">' + k.label + '</div>' +
            (k.sub ? '<div class="an-kpi-sub">' + k.sub + '</div>' : '') + '</div>';
    });
    finKpis += '</div>';

    var maxRev = 0;
    m.monthlyRevenue.forEach(function(r) { if (r.value > maxRev) maxRev = r.value; });
    var revChart = '<div class="an-section"><div class="an-section-title">Revenue by Month</div><div class="card"><div class="an-revenue-chart">';
    m.monthlyRevenue.forEach(function(r) {
        var pct = maxRev > 0 ? Math.round((r.value / maxRev) * 100) : 0;
        revChart += '<div class="an-rev-col"><div class="an-rev-val">' + h.formatCurrency(r.value) + '</div>' +
            '<div class="an-rev-bar" style="height:' + pct + '%"></div>' +
            '<div class="an-rev-label">' + r.month + '</div></div>';
    });
    revChart += '</div></div></div>';

    var maxArtRev = 0;
    m.revenueByArtist.forEach(function(r) { if (r.revenue > maxArtRev) maxArtRev = r.revenue; });
    var artRevTable = '<div class="an-section"><div class="an-section-title">Revenue by Artist</div>' +
        '<div class="card" style="padding:0;overflow:hidden"><table class="data-table"><thead><tr>' +
        '<th>Artist</th><th>Revenue</th><th style="width:50%">Share</th></tr></thead><tbody>';
    m.revenueByArtist.forEach(function(r) {
        var pct = maxArtRev > 0 ? Math.round((r.revenue / maxArtRev) * 100) : 0;
        var share = grossRevenue > 0 ? Math.round((r.revenue / grossRevenue) * 100) : 0;
        artRevTable += '<tr><td style="font-weight:600;color:#fff">' + r.artist + '</td>' +
            '<td style="font-family:var(--font-mono);font-weight:700">' + h.formatCurrency(r.revenue) + '</td>' +
            '<td><div style="display:flex;align-items:center;gap:8px"><div class="an-artist-bar-track">' +
            '<div class="an-artist-bar-fill" style="width:' + pct + '%;background:var(--accent-purple)"></div></div>' +
            '<span style="font-size:0.72rem;font-family:var(--font-mono);color:var(--text-dim);min-width:30px">' + share + '%</span></div></td></tr>';
    });
    artRevTable += '</tbody></table></div></div>';

    finPanel.innerHTML = finKpis + '<div class="an-two-col">' + revChart + artRevTable + '</div>';

    var growthPanel = document.getElementById('an-tab-artist-growth');
    var sortedArtists = data.artists.slice().sort(function(a, b) { return b.growthScore - a.growthScore; });
    var growthTable = '<div class="an-section"><div class="an-section-title">Artist Growth Comparison</div>' +
        '<div class="card" style="padding:0;overflow:hidden"><table class="data-table"><thead><tr>' +
        '<th>Artist</th><th>Growth Score</th><th>Social Trend</th><th>Streaming / mo</th>' +
        '<th>Career Stage</th><th>Territories</th><th>Gigs</th><th>Releases</th></tr></thead><tbody>';
    sortedArtists.forEach(function(a) {
        var color = h.getScoreColor(a.growthScore);
        growthTable += '<tr>' +
            '<td style="font-weight:600;color:#fff">' + a.name + '</td>' +
            '<td><div class="score-bar"><div class="score-bar-track"><div class="score-bar-fill" style="width:' + a.growthScore + '%;background:' + color + '"></div></div>' +
            '<div class="score-bar-value" style="color:' + color + '">' + a.growthScore + '</div></div></td>' +
            '<td style="font-family:var(--font-mono);color:var(--accent-green)">' + a.socialTrend + '</td>' +
            '<td style="font-family:var(--font-mono)">' + a.streamingMonthly.toLocaleString() + '</td>' +
            '<td><span class="tag ' + (a.careerStage === 'Emerging' ? 'green' : a.careerStage === 'Rising' ? 'blue' : 'purple') + '">' + a.careerStage + '</span></td>' +
            '<td style="font-family:var(--font-mono);text-align:center">' + a.territories.length + '</td>' +
            '<td style="font-family:var(--font-mono);text-align:center">' + a.recentGigs + '</td>' +
            '<td style="font-family:var(--font-mono);text-align:center">' + a.recentReleases + '</td>' +
            '</tr>';
    });
    growthTable += '</tbody></table></div></div>';
    growthPanel.innerHTML = growthTable;

    var mktPanel = document.getElementById('an-tab-marketing');
    var totalReach = 0;
    var totalEngagement = 0;
    var activeCampaigns = 0;
    var totalPublished = 0;
    var totalAwaiting = 0;
    var totalScheduled = 0;
    data.campaigns.forEach(function(c) {
        totalReach += c.reach;
        totalEngagement += c.engagement;
        totalPublished += c.postsPublished;
        totalAwaiting += c.postsAwaitingApproval;
        totalScheduled += c.postsScheduled;
        if (c.status === 'active') activeCampaigns++;
    });
    var approvalRate = totalScheduled > 0 ? Math.round(((totalPublished) / totalScheduled) * 100) : 0;

    var mktKpis = '<div class="an-kpi-row">';
    var mktKpiData = [
        { val: totalReach.toLocaleString(), label: 'Total Reach', color: 'var(--accent-purple)' },
        { val: totalEngagement.toLocaleString(), label: 'Total Engagement', color: 'var(--accent-blue)' },
        { val: activeCampaigns, label: 'Active Campaigns', color: 'var(--accent-green)' },
        { val: totalPublished, label: 'Posts Published', color: 'var(--accent-amber)' },
        { val: approvalRate + '%', label: 'Approval Rate', color: 'var(--accent-gold)' }
    ];
    mktKpiData.forEach(function(k) {
        mktKpis += '<div class="an-kpi"><div class="an-kpi-val" style="color:' + k.color + '">' + k.val + '</div>' +
            '<div class="an-kpi-label">' + k.label + '</div></div>';
    });
    mktKpis += '</div>';

    var campTable = '<div class="an-section"><div class="an-section-title">Campaign Performance</div>' +
        '<div class="card" style="padding:0;overflow:hidden"><table class="data-table"><thead><tr>' +
        '<th>Campaign</th><th>Status</th><th>Type</th><th>Artists</th><th>Reach</th><th>Engagement</th>' +
        '<th>Posts</th><th>Budget</th></tr></thead><tbody>';
    data.campaigns.forEach(function(c) {
        var badgeColor = h.getStatusBadge(c.status);
        campTable += '<tr>' +
            '<td style="font-weight:600;color:#fff">' + c.name + '</td>' +
            '<td><span class="badge ' + badgeColor + '">' + c.status + '</span></td>' +
            '<td style="font-size:0.78rem">' + c.type + '</td>' +
            '<td style="font-size:0.78rem">' + c.artists.join(', ') + '</td>' +
            '<td style="font-family:var(--font-mono)">' + c.reach.toLocaleString() + '</td>' +
            '<td style="font-family:var(--font-mono)">' + c.engagement.toLocaleString() + '</td>' +
            '<td style="font-family:var(--font-mono)">' + c.postsPublished + '/' + c.postsScheduled + '</td>' +
            '<td style="font-family:var(--font-mono)">' + h.formatCurrency(c.budget) + '</td>' +
            '</tr>';
    });
    campTable += '</tbody></table></div></div>';
    mktPanel.innerHTML = mktKpis + campTable;

    var opsPanel = document.getElementById('an-tab-operations');
    var opsCards = [
        { val: m.tasksCompletedOnTime + '%', label: 'Tasks On Time', color: 'var(--accent-green)', pct: m.tasksCompletedOnTime, target: 'Target: 90%' },
        { val: m.blockedDependencies, label: 'Blocked Dependencies', color: 'var(--accent-red)', pct: null, target: null },
        { val: m.contractTurnaround + 'd', label: 'Contract Turnaround', color: 'var(--accent-blue)', pct: Math.round((1 - m.contractTurnaround / 14) * 100), target: 'Target: < 7 days' },
        { val: m.clientResponseTime + 'd', label: 'Client Response Time', color: 'var(--accent-amber)', pct: Math.round((1 - m.clientResponseTime / 7) * 100), target: 'Target: < 2 days' },
        { val: m.artistResponseTime + 'd', label: 'Artist Response Time', color: 'var(--accent-green)', pct: Math.round((1 - m.artistResponseTime / 3) * 100), target: 'Target: < 1 day' },
        { val: m.avgTimeToConfirm + 'd', label: 'Avg Lead to Confirm', color: 'var(--accent-purple)', pct: Math.round((1 - m.avgTimeToConfirm / 30) * 100), target: 'Target: < 14 days' }
    ];

    var opsHtml = '<div class="an-ops-grid">';
    opsCards.forEach(function(o) {
        opsHtml += '<div class="an-ops-card"><div class="an-ops-val" style="color:' + o.color + '">' + o.val + '</div>' +
            '<div class="an-ops-label">' + o.label + '</div>';
        if (o.pct !== null) {
            var barColor = o.pct >= 70 ? 'var(--accent-green)' : o.pct >= 40 ? 'var(--accent-amber)' : 'var(--accent-red)';
            opsHtml += '<div class="an-progress-track"><div class="an-progress-fill" style="width:' + Math.max(0, Math.min(100, o.pct)) + '%;background:' + barColor + '"></div></div>';
        }
        if (o.target) {
            opsHtml += '<div class="an-ops-indicator">' + o.target + '</div>';
        }
        opsHtml += '</div>';
    });
    opsHtml += '</div>';
    opsPanel.innerHTML = opsHtml;

    var leadsPanel = document.getElementById('an-tab-leads');
    var convRate = m.leadConversionRate;
    var circumference = 2 * Math.PI * 42;
    var dashOffset = circumference - (convRate / 100) * circumference;

    var leadHero = '<div class="an-lead-hero"><div class="an-lead-ring">' +
        '<svg viewBox="0 0 100 100"><circle class="an-lead-ring-bg" cx="50" cy="50" r="42"/>' +
        '<circle class="an-lead-ring-fill" cx="50" cy="50" r="42" stroke="var(--accent-green)" ' +
        'stroke-dasharray="' + circumference + '" stroke-dashoffset="' + dashOffset + '"/></svg>' +
        '<div class="an-lead-ring-text">' + convRate + '%</div></div>' +
        '<div class="an-lead-detail"><div class="an-lead-detail-title">Lead Conversion Rate</div>' +
        '<div class="an-lead-detail-sub">Average time from lead to confirmed booking: ' + m.avgTimeToConfirm + ' days</div></div></div>';

    var terrTable = '<div class="an-section"><div class="an-section-title">Top Territories</div>' +
        '<div class="card" style="padding:0;overflow:hidden"><table class="data-table"><thead><tr>' +
        '<th>Territory</th><th>Gigs</th><th>Revenue</th><th style="width:40%">Share</th></tr></thead><tbody>';
    var maxTerrRev = 0;
    m.topTerritories.forEach(function(t) { if (t.revenue > maxTerrRev) maxTerrRev = t.revenue; });
    var totalTerrRev = 0;
    m.topTerritories.forEach(function(t) { totalTerrRev += t.revenue; });
    m.topTerritories.forEach(function(t) {
        var pct = maxTerrRev > 0 ? Math.round((t.revenue / maxTerrRev) * 100) : 0;
        var share = totalTerrRev > 0 ? Math.round((t.revenue / totalTerrRev) * 100) : 0;
        terrTable += '<tr><td style="font-weight:600;color:#fff">' + t.territory + '</td>' +
            '<td style="font-family:var(--font-mono);text-align:center">' + t.gigs + '</td>' +
            '<td style="font-family:var(--font-mono)">' + h.formatCurrency(t.revenue) + '</td>' +
            '<td><div style="display:flex;align-items:center;gap:8px"><div class="an-artist-bar-track">' +
            '<div class="an-artist-bar-fill" style="width:' + pct + '%;background:var(--accent-blue)"></div></div>' +
            '<span style="font-size:0.72rem;font-family:var(--font-mono);color:var(--text-dim);min-width:30px">' + share + '%</span></div></td></tr>';
    });
    terrTable += '</tbody></table></div></div>';

    var clientTable = '<div class="an-section"><div class="an-section-title">Client Summary</div>' +
        '<div class="card" style="padding:0;overflow:hidden"><table class="data-table"><thead><tr>' +
        '<th>Company</th><th>Deals</th><th>Avg Deal Size</th><th>Payment Reliability</th><th>Responsiveness</th></tr></thead><tbody>';
    data.companies.forEach(function(c) {
        var payColor = c.paymentReliability === 'excellent' ? 'green' : c.paymentReliability === 'good' ? 'blue' : 'amber';
        var respColor = c.responsiveness === 'fast' ? 'green' : c.responsiveness === 'moderate' ? 'amber' : 'red';
        clientTable += '<tr><td style="font-weight:600;color:#fff">' + c.name + '</td>' +
            '<td style="font-family:var(--font-mono);text-align:center">' + c.dealCount + '</td>' +
            '<td style="font-family:var(--font-mono)">' + h.formatCurrency(c.avgDealSize) + '</td>' +
            '<td><span class="badge ' + payColor + '">' + c.paymentReliability + '</span></td>' +
            '<td><span class="badge ' + respColor + '">' + c.responsiveness + '</span></td></tr>';
    });
    clientTable += '</tbody></table></div></div>';

    leadsPanel.innerHTML = leadHero + '<div class="an-two-col">' + terrTable + clientTable + '</div>';
})();
</script>
</body>
</html>
