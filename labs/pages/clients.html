<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portals — LABS Institute</title>
<style>
    .portal-card {
        background: var(--card-gradient);
        border: 1px solid var(--border-medium);
        border-radius: var(--card-radius);
        padding: var(--card-padding);
        transition: transform 0.15s, border-color 0.15s;
    }

    .portal-card:hover {
        transform: translateY(-2px);
        border-color: rgba(167,139,250,0.3);
    }

    .portal-card-company {
        font-size: 1.1rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 4px;
    }

    .portal-card-event {
        font-size: 0.82rem;
        color: var(--text-muted);
        margin-bottom: 14px;
    }

    .portal-progress-section {
        margin-bottom: 14px;
    }

    .portal-progress-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.72rem;
        color: var(--text-dim);
        margin-bottom: 6px;
    }

    .portal-progress-text {
        font-size: 0.78rem;
        color: var(--text-secondary);
        font-family: var(--font-mono);
    }

    .portal-progress-track {
        height: 6px;
        background: rgba(255,255,255,0.06);
        border-radius: 3px;
        overflow: hidden;
    }

    .portal-progress-fill {
        height: 100%;
        border-radius: 3px;
        background: var(--accent-purple);
        transition: width 0.8s ease;
    }

    .portal-badges {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 12px;
    }

    .portal-stats {
        display: flex;
        gap: 12px;
        margin-bottom: 14px;
    }

    .portal-stat {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.75rem;
        color: var(--text-muted);
    }

    .portal-stat-count {
        font-family: var(--font-mono);
        font-weight: 700;
    }

    .portal-stat-count.blocked {
        color: var(--accent-red);
    }

    .portal-view-btn {
        width: 100%;
        padding: 8px 0;
        border: 1px solid var(--border-medium);
        border-radius: 8px;
        background: rgba(255,255,255,0.03);
        color: var(--text-secondary);
        font-size: 0.8rem;
        font-weight: 600;
        font-family: var(--font-family);
        cursor: pointer;
        transition: all 0.15s;
    }

    .portal-view-btn:hover {
        background: rgba(167,139,250,0.1);
        border-color: rgba(167,139,250,0.3);
        color: #fff;
    }

    .portal-detail {
        display: none;
    }

    .portal-detail.active {
        display: block;
    }

    .portal-list.hidden {
        display: none;
    }

    .callout-info {
        background: rgba(56,189,248,0.06);
        border: 1px solid rgba(56,189,248,0.15);
        border-left: 3px solid var(--accent-blue);
        border-radius: 10px;
        padding: 14px 18px;
        margin-bottom: 8px;
    }

    .callout-info-title {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--accent-blue);
        margin-bottom: 4px;
    }

    .callout-info-body {
        font-size: 0.8rem;
        color: var(--text-body);
        line-height: 1.6;
    }

    .privacy-note {
        font-size: 0.72rem;
        color: var(--text-dim);
        padding: 8px 18px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .privacy-note svg {
        width: 14px;
        height: 14px;
        stroke: var(--text-dim);
        fill: none;
        stroke-width: 2;
        flex-shrink: 0;
    }

    .detail-section {
        margin-bottom: 20px;
    }

    .detail-section-title {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border-subtle);
    }

    .event-summary-card {
        background: var(--card-gradient);
        border: 1px solid var(--border-medium);
        border-radius: var(--card-radius);
        padding: 20px;
        margin-bottom: 20px;
    }

    .event-summary-name {
        font-size: 1.15rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 10px;
    }

    .event-summary-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
    }

    .event-summary-row {
        display: flex;
        justify-content: space-between;
        padding: 5px 0;
        font-size: 0.8rem;
    }

    .event-summary-label {
        color: var(--text-dim);
    }

    .event-summary-val {
        color: var(--text-secondary);
        font-family: var(--font-mono);
        font-size: 0.78rem;
    }

    .task-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.82rem;
    }

    .task-table th {
        text-align: left;
        font-size: 0.68rem;
        font-weight: 700;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 8px 10px;
        border-bottom: 1px solid var(--border-medium);
    }

    .task-table td {
        padding: 10px;
        border-bottom: 1px solid var(--border-subtle);
        color: var(--text-body);
    }

    .task-table tr:last-child td {
        border-bottom: none;
    }

    .task-title-cell {
        font-weight: 500;
        color: var(--text-secondary);
    }

    .priority-indicator {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: capitalize;
    }

    .priority-indicator.high { color: var(--accent-red); }
    .priority-indicator.medium { color: var(--accent-amber); }
    .priority-indicator.low { color: var(--text-dim); }

    .priority-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
    }

    .priority-indicator.high .priority-dot { background: var(--accent-red); }
    .priority-indicator.medium .priority-dot { background: var(--accent-amber); }
    .priority-indicator.low .priority-dot { background: var(--text-dim); }

    .contract-payment-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .cp-card {
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border-subtle);
        border-radius: 10px;
        padding: 16px;
    }

    .cp-card-label {
        font-size: 0.68rem;
        font-weight: 700;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 8px;
    }

    .cp-card-value {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 4px;
    }

    .cp-card-sub {
        font-size: 0.75rem;
        color: var(--text-muted);
    }

    .marketing-approvals-section {
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border-subtle);
        border-radius: 10px;
        padding: 16px;
    }

    .marketing-approvals-count {
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-bottom: 8px;
    }

    .marketing-placeholder {
        font-size: 0.78rem;
        color: var(--text-dim);
        font-style: italic;
    }

    @media (max-width: 1024px) {
        .event-summary-grid {
            grid-template-columns: 1fr;
        }
        .contract-payment-grid {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>
<body>
    <div class="labs-page portal-list" id="portal-list">
        <div class="labs-page-header">
            <div>
                <div class="labs-page-title">Client Portals</div>
                <div class="labs-page-subtitle" id="portal-subtitle"></div>
            </div>
        </div>
        <div class="labs-grid-3" id="portal-grid"></div>
    </div>

    <div class="labs-page portal-detail" id="portal-detail">
        <div class="labs-page-header">
            <div>
                <button class="btn btn-back btn-sm btn-ghost" onclick="window._clientsPage.showList()">&#8592; Back to Portals</button>
            </div>
        </div>
        <div id="portal-detail-content"></div>
    </div>

    <script>
    (function() {
        var portals = window.LabsData.clientPortals;
        var helpers = window.LabsHelpers;
        var gigs = window.LabsData.gigs;
        var contracts = window.LabsData.contracts;
        var opportunities = window.LabsData.opportunities;

        function getContractBadge(status) {
            var map = {
                'Awaiting Signature': 'amber',
                'Signed': 'green',
                'Draft': 'red',
                'Sent': 'blue'
            };
            return map[status] || 'purple';
        }

        function getDepositBadge(status) {
            var map = {
                'Paid': 'green',
                'Pending': 'amber',
                'Not Invoiced': 'red'
            };
            return map[status] || 'purple';
        }

        function findEventDetails(portal) {
            var gig = gigs.find(function(g) { return g.company === portal.company; });
            var opp = opportunities.find(function(o) { return o.company === portal.company; });
            var con = contracts.find(function(c) { return c.company === portal.company; });

            var venue = '--';
            var date = '--';
            var lineup = [];

            if (gig) {
                venue = gig.venue;
                date = helpers.formatDate(gig.date);
                lineup = gig.artists || [];
            } else if (opp) {
                venue = opp.venue;
                date = helpers.formatDate(opp.eventDate);
                lineup = opp.recommendedArtists || [];
            }

            return { venue: venue, date: date, lineup: lineup, contract: con };
        }

        function renderGrid() {
            document.getElementById('portal-subtitle').textContent = portals.length + ' active portals';
            var grid = document.getElementById('portal-grid');
            grid.innerHTML = portals.map(function(p) {
                var total = p.pendingTasks + p.completedTasks;
                var pct = total > 0 ? Math.round((p.completedTasks / total) * 100) : 0;

                var html = '<div class="portal-card">';

                html += '<div class="portal-card-company">' + p.company + '</div>';
                html += '<div class="portal-card-event">' + p.event + '</div>';

                html += '<div class="portal-progress-section">';
                html += '<div class="portal-progress-label">';
                html += '<span>Task Progress</span>';
                html += '<span class="portal-progress-text">' + p.pendingTasks + ' pending / ' + p.completedTasks + ' completed</span>';
                html += '</div>';
                html += '<div class="portal-progress-track"><div class="portal-progress-fill" style="width:' + pct + '%"></div></div>';
                html += '</div>';

                html += '<div class="portal-badges">';
                html += '<span class="badge ' + getContractBadge(p.contractStatus) + '">' + p.contractStatus + '</span>';
                html += '<span class="badge ' + getDepositBadge(p.depositStatus) + '">' + p.depositStatus + '</span>';
                html += '</div>';

                html += '<div class="portal-stats">';
                html += '<div class="portal-stat">Marketing approvals: <span class="portal-stat-count">' + p.marketingApprovals + '</span></div>';
                if (p.blockedItems > 0) {
                    html += '<div class="portal-stat">Blocked: <span class="portal-stat-count blocked">' + p.blockedItems + '</span></div>';
                } else {
                    html += '<div class="portal-stat">Blocked: <span class="portal-stat-count">0</span></div>';
                }
                html += '</div>';

                html += '<button class="portal-view-btn" onclick="window._clientsPage.showDetail(\'' + p.id + '\')">View Portal</button>';

                html += '</div>';
                return html;
            }).join('');
        }

        function renderDetail(portalId) {
            var p = portals.find(function(x) { return x.id === portalId; });
            if (!p) return;

            var details = findEventDetails(p);
            var html = '';

            html += '<div class="callout-info">';
            html += '<div class="callout-info-title">Client Portal Preview — This is what ' + p.company + ' sees</div>';
            html += '<div class="callout-info-body">This view shows only the information shared with the client. Use it to review what your client can access before sending portal invitations.</div>';
            html += '</div>';

            html += '<div class="privacy-note">';
            html += '<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';
            html += 'Internal profit margins, negotiation notes, risk analysis, and alternative scenarios are hidden from the client view.';
            html += '</div>';

            html += '<div class="event-summary-card">';
            html += '<div class="event-summary-name">' + p.event + '</div>';
            html += '<div class="event-summary-grid">';
            html += '<div class="event-summary-row"><span class="event-summary-label">Company</span><span class="event-summary-val">' + p.company + '</span></div>';
            html += '<div class="event-summary-row"><span class="event-summary-label">Date</span><span class="event-summary-val">' + details.date + '</span></div>';
            html += '<div class="event-summary-row"><span class="event-summary-label">Venue</span><span class="event-summary-val">' + details.venue + '</span></div>';
            html += '<div class="event-summary-row"><span class="event-summary-label">Lineup</span><span class="event-summary-val">' + (details.lineup.length > 0 ? details.lineup.join(', ') : 'TBC') + '</span></div>';
            html += '</div>';
            html += '</div>';

            html += '<div class="detail-section">';
            html += '<div class="detail-section-title">Your Tasks</div>';
            html += '<table class="task-table">';
            html += '<thead><tr>';
            html += '<th>Task</th>';
            html += '<th>Status</th>';
            html += '<th>Due Date</th>';
            html += '<th>Priority</th>';
            html += '</tr></thead>';
            html += '<tbody>';
            p.tasks.forEach(function(t) {
                var statusBadge = t.status === 'completed' ? 'green' : 'amber';
                var statusLabel = t.status === 'completed' ? 'Completed' : 'Pending';
                html += '<tr>';
                html += '<td class="task-title-cell">' + t.title + '</td>';
                html += '<td><span class="badge ' + statusBadge + '">' + statusLabel + '</span></td>';
                html += '<td style="font-family:var(--font-mono);font-size:0.78rem;color:var(--text-muted)">' + helpers.formatDate(t.dueDate) + '</td>';
                html += '<td><span class="priority-indicator ' + t.priority + '"><span class="priority-dot"></span>' + t.priority + '</span></td>';
                html += '</tr>';
            });
            html += '</tbody></table>';
            html += '</div>';

            html += '<div class="detail-section">';
            html += '<div class="detail-section-title">Contract & Payment Status</div>';
            html += '<div class="contract-payment-grid">';

            html += '<div class="cp-card">';
            html += '<div class="cp-card-label">Contract</div>';
            html += '<div class="cp-card-value"><span class="badge ' + getContractBadge(p.contractStatus) + '">' + p.contractStatus + '</span></div>';
            if (details.contract) {
                html += '<div class="cp-card-sub">' + details.contract.type + ' &middot; v' + details.contract.version + '</div>';
                if (details.contract.deadline) {
                    var daysLeft = helpers.daysUntil(details.contract.deadline);
                    var urgency = daysLeft !== null && daysLeft <= 7 ? 'color:var(--accent-red)' : '';
                    html += '<div class="cp-card-sub" style="margin-top:4px;' + urgency + '">Deadline: ' + helpers.formatDate(details.contract.deadline) + '</div>';
                }
            }
            html += '</div>';

            html += '<div class="cp-card">';
            html += '<div class="cp-card-label">Deposit</div>';
            html += '<div class="cp-card-value"><span class="badge ' + getDepositBadge(p.depositStatus) + '">' + p.depositStatus + '</span></div>';
            if (details.contract) {
                html += '<div class="cp-card-sub">Amount: ' + helpers.formatCurrency(details.contract.depositAmount, 'GBP') + '</div>';
            }
            html += '</div>';

            html += '</div>';
            html += '</div>';

            html += '<div class="detail-section">';
            html += '<div class="detail-section-title">Marketing Approvals</div>';
            html += '<div class="marketing-approvals-section">';
            if (p.marketingApprovals > 0) {
                html += '<div class="marketing-approvals-count">' + p.marketingApprovals + ' item' + (p.marketingApprovals !== 1 ? 's' : '') + ' awaiting your approval</div>';
                html += '<div class="marketing-placeholder">Marketing assets will appear here when ready for review.</div>';
            } else {
                html += '<div class="marketing-placeholder">No marketing approvals pending. All clear.</div>';
            }
            html += '</div>';
            html += '</div>';

            html += '<div class="detail-section">';
            html += '<div class="detail-section-title">Messages</div>';
            html += '<div class="empty-state" style="padding:40px 20px">';
            html += '<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="var(--text-faint)" fill="none" stroke-width="1.5"/></svg>';
            html += '<h3>No messages yet</h3>';
            html += '<p>Direct messaging with your LABS team will appear here.</p>';
            html += '</div>';
            html += '</div>';

            document.getElementById('portal-detail-content').innerHTML = html;
        }

        function showDetail(portalId) {
            renderDetail(portalId);
            document.getElementById('portal-list').classList.add('hidden');
            document.getElementById('portal-detail').classList.add('active');
        }

        function showList() {
            document.getElementById('portal-detail').classList.remove('active');
            document.getElementById('portal-list').classList.remove('hidden');
        }

        window._clientsPage = {
            showDetail: showDetail,
            showList: showList
        };

        renderGrid();
    })();
    </script>
</body>
</html>
