<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
.opp-kanban {
    display: flex;
    gap: 14px;
    min-height: 500px;
    overflow-x: auto;
    padding-bottom: 12px;
}

.opp-kanban::-webkit-scrollbar {
    height: 6px;
}

.opp-kanban::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.02);
    border-radius: 3px;
}

.opp-kanban::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
}

.opp-column {
    flex: 0 0 280px;
    min-width: 280px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border-light);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.opp-column-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 2px solid var(--accent-slate);
    background: rgba(255,255,255,0.015);
}

.opp-column-header[data-stage="New Lead"] { border-bottom-color: var(--accent-blue); }
.opp-column-header[data-stage="Needs Review"] { border-bottom-color: var(--accent-amber); }
.opp-column-header[data-stage="Qualified"] { border-bottom-color: var(--accent-purple); }
.opp-column-header[data-stage="Simulation Needed"] { border-bottom-color: var(--accent-blue); }
.opp-column-header[data-stage="Negotiation"] { border-bottom-color: var(--accent-amber); }
.opp-column-header[data-stage="Contract Pending"] { border-bottom-color: var(--accent-gold); }
.opp-column-header[data-stage="Confirmed"] { border-bottom-color: var(--accent-green); }
.opp-column-header[data-stage="Lost"] { border-bottom-color: var(--accent-red); }

.opp-column-cards {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.opp-column-cards::-webkit-scrollbar {
    width: 4px;
}

.opp-column-cards::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
}

.opp-column-empty {
    text-align: center;
    color: var(--text-faint);
    font-size: 0.75rem;
    padding: 32px 12px;
}

.opp-card {
    background: var(--card-gradient);
    border: 1px solid var(--border-medium);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
}

.opp-card:hover {
    transform: translateY(-2px);
    border-color: rgba(167,139,250,0.35);
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}

.opp-card-name {
    font-size: 0.85rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
    line-height: 1.3;
}

.opp-card-company {
    font-size: 0.72rem;
    color: var(--accent-purple);
    font-weight: 600;
    margin-bottom: 6px;
}

.opp-card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-bottom: 8px;
}

.opp-card-meta svg {
    width: 12px;
    height: 12px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
}

.opp-card-meta-item {
    display: flex;
    align-items: center;
    gap: 3px;
}

.opp-card-budget {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--accent-green);
    font-family: var(--font-mono);
    margin-bottom: 8px;
}

.opp-card-artists {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 8px;
}

.opp-card-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 8px;
}

.opp-card-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.opp-card-stat-label {
    font-size: 0.6rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
}

.opp-card-stat-value {
    font-size: 0.75rem;
    font-weight: 700;
    font-family: var(--font-mono);
}

.opp-card-lead-score {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
}

.opp-card-lead-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
}

.opp-card-lead-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
}

.opp-card-lead-label {
    font-size: 0.6rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    min-width: 32px;
}

.opp-card-lead-val {
    font-size: 0.72rem;
    font-weight: 700;
    font-family: var(--font-mono);
    min-width: 24px;
    text-align: right;
}

.opp-card-missing {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.65rem;
    color: var(--accent-amber);
    margin-bottom: 6px;
}

.opp-card-missing svg {
    width: 11px;
    height: 11px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
}

.opp-card-action {
    font-size: 0.68rem;
    color: var(--text-muted);
    padding-top: 8px;
    border-top: 1px solid var(--border-subtle);
    line-height: 1.4;
}

.opp-card-action-label {
    font-size: 0.58rem;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
}

.opp-summary-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
}

.opp-summary-card {
    background: var(--card-gradient);
    border: 1px solid var(--border-medium);
    border-radius: 10px;
    padding: 14px 16px;
    text-align: center;
}

.opp-summary-val {
    font-size: 1.4rem;
    font-weight: 800;
    line-height: 1;
}

.opp-summary-label {
    font-size: 0.65rem;
    color: var(--text-label);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 4px;
}
</style>
</head>
<body>
<div class="labs-page">
    <div class="labs-page-header">
        <div>
            <div class="labs-page-title">Opportunity Board</div>
        </div>
    </div>

    <div id="opp-summary" class="opp-summary-row"></div>
    <div id="opp-board" class="opp-kanban"></div>
</div>

<script>
(function() {
    var data = window.LabsData;
    var h = window.LabsHelpers;
    var opportunities = data.opportunities || [];

    var stages = [
        'New Lead',
        'Needs Review',
        'Qualified',
        'Simulation Needed',
        'Negotiation',
        'Contract Pending',
        'Confirmed',
        'Lost'
    ];

    var grouped = {};
    stages.forEach(function(s) { grouped[s] = []; });
    opportunities.forEach(function(opp) {
        if (grouped[opp.stage]) grouped[opp.stage].push(opp);
    });

    var totalPipeline = 0;
    var totalProfit = 0;
    var avgLead = 0;
    opportunities.forEach(function(opp) {
        totalPipeline += opp.estimatedRevenue || 0;
        totalProfit += opp.estimatedProfit || 0;
        avgLead += opp.leadScore || 0;
    });
    if (opportunities.length > 0) avgLead = Math.round(avgLead / opportunities.length);

    var summaryEl = document.getElementById('opp-summary');
    summaryEl.innerHTML =
        '<div class="opp-summary-card"><div class="opp-summary-val text-blue">' + opportunities.length + '</div><div class="opp-summary-label">Active Opportunities</div></div>' +
        '<div class="opp-summary-card"><div class="opp-summary-val text-green">' + h.formatCurrency(totalPipeline) + '</div><div class="opp-summary-label">Pipeline Value</div></div>' +
        '<div class="opp-summary-card"><div class="opp-summary-val text-purple">' + h.formatCurrency(totalProfit) + '</div><div class="opp-summary-label">Est. Total Profit</div></div>' +
        '<div class="opp-summary-card"><div class="opp-summary-val text-amber">' + avgLead + '</div><div class="opp-summary-label">Avg Lead Score</div></div>';

    function renderCard(opp) {
        var artistTags = '';
        if (opp.recommendedArtists && opp.recommendedArtists.length) {
            opp.recommendedArtists.forEach(function(a) {
                artistTags += '<span class="tag purple">' + a + '</span>';
            });
        }

        var leadColor = h.getScoreColor(opp.leadScore);
        var riskColor = h.getRiskColor(opp.riskScore);

        var missingHtml = '';
        if (opp.missingInfo && opp.missingInfo.length > 0) {
            missingHtml = '<div class="opp-card-missing">' +
                '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
                opp.missingInfo.length + ' missing item' + (opp.missingInfo.length > 1 ? 's' : '') +
                '</div>';
        }

        return '<div class="opp-card">' +
            '<div class="opp-card-name">' + opp.name + '</div>' +
            '<div class="opp-card-company">' + opp.company + '</div>' +
            '<div class="opp-card-meta">' +
                '<span class="opp-card-meta-item"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' + opp.location + '</span>' +
                '<span class="opp-card-meta-item"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' + h.formatDateShort(opp.eventDate) + '</span>' +
            '</div>' +
            '<div class="opp-card-budget">' + h.formatCurrency(opp.budget) + '</div>' +
            '<div class="opp-card-artists">' + artistTags + '</div>' +
            '<div class="opp-card-stats">' +
                '<div class="opp-card-stat"><span class="opp-card-stat-label">Profit</span><span class="opp-card-stat-value text-green">' + h.formatCurrency(opp.estimatedProfit) + '</span></div>' +
                '<div class="opp-card-stat"><span class="opp-card-stat-label">Risk</span><span class="opp-card-stat-value" style="color:' + riskColor + '">' + opp.riskScore + '</span></div>' +
            '</div>' +
            '<div class="opp-card-lead-score">' +
                '<span class="opp-card-lead-label">Lead</span>' +
                '<div class="opp-card-lead-track"><div class="opp-card-lead-fill" style="width:' + opp.leadScore + '%;background:' + leadColor + '"></div></div>' +
                '<span class="opp-card-lead-val" style="color:' + leadColor + '">' + opp.leadScore + '</span>' +
            '</div>' +
            missingHtml +
            '<div class="opp-card-action"><div class="opp-card-action-label">Next Action</div>' + opp.nextAction + '</div>' +
        '</div>';
    }

    var boardEl = document.getElementById('opp-board');
    var html = '';
    stages.forEach(function(stage) {
        var items = grouped[stage];
        var cardsHtml = '';
        if (items.length === 0) {
            cardsHtml = '<div class="opp-column-empty">No opportunities</div>';
        } else {
            items.forEach(function(opp) {
                cardsHtml += renderCard(opp);
            });
        }

        html += '<div class="opp-column">' +
            '<div class="opp-column-header" data-stage="' + stage + '">' +
                '<span class="kanban-column-title">' + stage + '</span>' +
                '<span class="kanban-column-count">' + items.length + '</span>' +
            '</div>' +
            '<div class="opp-column-cards">' + cardsHtml + '</div>' +
        '</div>';
    });
    boardEl.innerHTML = html;
})();
</script>
</body>
</html>
