<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NeuroSpect — The AI-native intelligence layer for ICT traders. Backtesting, coaching, research, and automated execution.">
  <title>NeuroSpect — Intelligence Layer for ICT Traders</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%232563eb'/><text x='16' y='23' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='700' font-size='18'>N</text></svg>">
  <link rel="stylesheet" href="v2/v2-styles.css">
<template id="__bundler_thumbnail" data-bg-color="#050810">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" fill="#050810"/>
    <rect x="60" y="55" width="80" height="80" rx="18" fill="url(#ng)"/>
    <text x="100" y="112" text-anchor="middle" fill="#fff" font-family="sans-serif" font-weight="800" font-size="52">N</text>
    <text x="100" y="155" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-weight="700" font-size="14" letter-spacing="3">NEUROSPECT</text>
    <defs><linearGradient id="ng" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient></defs>
  </svg>
</template>
</head>
<body>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Data (plain JS — no Babel needed) -->
<script src="ns-data.js"></script>
<script src="ns-course-data.js"></script>
<script src="ns-features-data.js"></script>
<script src="ns-competitors-data.js"></script>

<!-- Components (5 Babel files + 1 inline = 6 total) -->
<script type="text/babel" src="v2/v2-shell.jsx"></script>
<script type="text/babel" src="v2/v2-home-course.jsx"></script>
<script type="text/babel" src="v2/v2-backtesting.jsx"></script>
<script type="text/babel" src="v2/v2-pages.jsx"></script>
<script type="text/babel" src="v2/v2-compare-deep.jsx"></script>

<!-- App -->
<script type="text/babel">
  function App() {
    const route = useRoute();

    const pages = {
      home: HomePage,
      course: CoursePage,
      backtesting: BacktestingPage,
      performance: PerformancePage,
      architecture: ArchitecturePage,
      features: FeaturesPage,
      compare: ComparePage,
      pricing: PricingPage,
    };

    const PageComponent = pages[route] || HomePage;

    return (
      <div className="shell">
        <Sidebar route={route} />
        <div className="main">
          <PageComponent />
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
